const INITIAL_FILTERS = FILTER_DEFS.reduce((acc, def) => {
  acc[def.key] = def.type === 'range' ? { min: '', max: '' } : (def.type === 'multi' ? [] : null);
  return acc;
}, {});

/* ============================================================
 * 카트(담긴 매물) 헬퍼 - 추후 엑셀/콤프 출력에 사용 가능 (요구사항 1)
 * ============================================================ */
const cartHelpers = {
  buildCartItem: (building, vacancy) => ({
    id: `${building.id}-${vacancy.floor}`,
    buildingId: building.id,
    buildingName: building.name,
    address: building.address,
    region: building.region,
    floor: vacancy.floor,
    area: vacancy.area,
    net: vacancy.net,
    noc: vacancy.noc,
    when: vacancy.when,
    addedAt: Date.now(),
  }),
  // 추후 엑셀 비교표용
  toCSV: (cart) => {
    const headers = ['빌딩명', '주소', '권역', '층', '임대면적(평)', '전용면적(평)', 'NOC', '입주시기'];
    const rows = cart.map(i => [i.buildingName, i.address, i.region, i.floor, i.area, i.net, i.noc, i.when]);
    return [headers, ...rows].map(r => r.join(',')).join('\n');
  },
};

/* ===== 빌딩 표시 헬퍼 ===== */
const formatFloors = (b) => `B${b.belowFloors}/${b.aboveFloors}F`;
const formatBuilt  = (b) => b.renovated ? `${b.built} / ${b.renovated}` : `${b.built}`;
const sumVacancyArea = (b) => b.vacancies.reduce((s, v) => s + v.area, 0);
const sumVacancyNet  = (b) => b.vacancies.reduce((s, v) => s + v.net, 0);
const avgVacancyNoc  = (b) => b.vacancies.length > 0
  ? Math.round(b.vacancies.reduce((s, v) => s + v.noc, 0) / b.vacancies.length) : 0;

/* ============================================================
 * Main
 * ============================================================ */
function GenstarMate() {
  const [selectedId, setSelectedId]       = useState(1);
  const [sidebarOpen, setSidebarOpen]     = useState(true);
  const [filters, setFilters]             = useState(INITIAL_FILTERS);
  const [openFilterKey, setOpenFilterKey] = useState(null);
  const [activeRegions, setActiveRegions] = useState(['CBD', 'GBD', 'YBD', 'BBD', 'OTHERS', 'OUT']);
  const [photoIdx, setPhotoIdx]           = useState(0);
  const [cart, setCart]                   = useState([]);
  const [cartOpen, setCartOpen]           = useState(false);

  const resetFilters = () => {
    setFilters(INITIAL_FILTERS);
    setActiveRegions(['CBD', 'GBD', 'YBD', 'BBD', 'OTHERS', 'OUT']);
    setOpenFilterKey(null);
  };

  const visibleBuildings = useMemo(
    () => BUILDINGS.filter(b => activeRegions.includes(b.region)),
    [activeRegions]
  );

  const selected = BUILDINGS.find(b => b.id === selectedId) || BUILDINGS[0];

  const hasFilterValue = (key) => {
    const v = filters[key];
    if (!v) return false;
    if (Array.isArray(v)) return v.length > 0;
    if (typeof v === 'object') return v.min || v.max;
    return true;
  };

  // 카트 핸들러
  const addToCart = useCallback((building, vacancy) => {
    setCart(prev => {
      const item = cartHelpers.buildCartItem(building, vacancy);
      return prev.find(i => i.id === item.id) ? prev : [...prev, item];
    });
  }, []);

  const addAllVacancies = useCallback((building) => {
    setCart(prev => {
      const newItems = building.vacancies
        .map(v => cartHelpers.buildCartItem(building, v))
        .filter(item => !prev.find(e => e.id === item.id));
      return [...prev, ...newItems];
    });
  }, []);

  const removeFromCart = useCallback((id) => setCart(prev => prev.filter(i => i.id !== id)), []);
  const clearCart      = useCallback(() => setCart([]), []);

  const handleSelectBuilding = useCallback((id) => {
    setSelectedId(id);
    setPhotoIdx(0);
  }, []);

  return (
    <div className="h-screen flex bg-slate-50 text-slate-800 overflow-hidden text-[13px]">
      <Sidebar open={sidebarOpen} onToggle={() => setSidebarOpen(!sidebarOpen)} />
      <div className="flex-1 flex flex-col min-w-0">
        <FilterBar filters={filters} setFilters={setFilters}
          openFilterKey={openFilterKey} setOpenFilterKey={setOpenFilterKey}
          hasFilterValue={hasFilterValue}
          activeRegions={activeRegions} setActiveRegions={setActiveRegions}
          resetFilters={resetFilters}
          cartCount={cart.length} onCartClick={() => setCartOpen(true)} />
        <main className="flex-1 flex overflow-hidden min-h-0">
          <div className="flex-1 relative bg-slate-100 min-w-0">
            <KakaoMap
              buildings={visibleBuildings}
              selectedId={selectedId}
              onMarkerClick={handleSelectBuilding} />
            <MapLegend />
            <MapStats count={visibleBuildings.length} regionCount={activeRegions.length} />
          </div>
          <DetailCard building={selected} photoIdx={photoIdx} setPhotoIdx={setPhotoIdx}
            onAddVacancy={addToCart} onAddAllVacancies={addAllVacancies} cart={cart} />
          <CompactList buildings={visibleBuildings} selectedId={selectedId}
            onSelect={handleSelectBuilding} />
        </main>
      </div>

      {cartOpen && (
        <CartDrawer cart={cart} onClose={() => setCartOpen(false)}
          onRemove={removeFromCart} onClear={clearCart} />
      )}
    </div>
  );
}

      section.items.forEach(item => {
        if (item.children) exp[item.label] = !!item.active;
      });
    });
    return exp;
  }, []);
  const [expanded, setExpanded] = useState(initialExpanded);
  const toggle = (label) => setExpanded(prev => ({ ...prev, [label]: !prev[label] }));

  return (
    <aside className={`bg-gradient-to-b from-slate-900 to-slate-800 text-slate-100 flex flex-col flex-shrink-0 transition-all duration-200 ${open ? 'w-48' : 'w-12'}`}>
      <div className="px-3 py-3 border-b border-slate-700/40 flex items-center justify-between flex-shrink-0">
        {open && (
          <div>
            <div className="text-[14px] font-bold tracking-tight">Genstar<span className="font-light text-indigo-300">Mate</span></div>
            <div className="text-[9px] text-slate-400 mt-0.5">CRM v1.0 · 오피스 임대</div>
          </div>
        )}
        <button onClick={onToggle} className="p-1 rounded hover:bg-slate-700/40 text-slate-400 hover:text-white">
          {open ? <PanelLeftClose size={14} /> : <PanelLeftOpen size={14} />}
        </button>
      </div>
      <nav className="flex-1 overflow-y-auto py-2">
        {NAV_SECTIONS.map(section => (
          <div key={section.group} className="mb-3">
            {open && <div className="px-3 text-[9px] font-semibold text-slate-500 uppercase tracking-wider mb-1">{section.group}</div>}
            {section.items.map(item => {
              const Icon = item.icon;
              const hasChildren = !!item.children;
              const isExpanded = hasChildren ? !!expanded[item.label] : false;
              return (
                <div key={item.label}>
                  <div onClick={() => hasChildren && toggle(item.label)}
                    className={`flex items-center gap-2 px-3 py-1.5 text-[12px] cursor-pointer transition select-none ${item.active ? 'text-white bg-slate-700/30' : 'text-slate-300 hover:bg-slate-700/30'}`}>
                    <Icon size={13} strokeWidth={1.75} />
                    {open && <span className="font-medium flex-1">{item.label}</span>}
                    {open && hasChildren && (
                      <ChevronDown size={11} className="text-slate-400 transition-transform duration-200"
                        style={{ transform: isExpanded ? 'rotate(180deg)' : 'rotate(0deg)' }} />
                    )}
                  </div>
                  {open && hasChildren && isExpanded && (
                    <div className="ml-6 mb-1">
                      {item.children.map(child => (
                        <div key={child} className={`px-3 py-1 text-[11px] cursor-pointer transition ${item.activeChild === child ? 'text-indigo-300 font-semibold border-l-2 border-indigo-400 pl-2.5' : 'text-slate-400 hover:text-slate-200'}`}>
                          {child}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        ))}
      </nav>
      {open && (
        <div className="px-3 py-2 border-t border-slate-700/40 flex items-center gap-2 flex-shrink-0">
          <div className="w-7 h-7 rounded-full bg-gradient-to-br from-indigo-400 to-purple-500 flex items-center justify-center text-[10px] font-bold flex-shrink-0">LM</div>
          <div className="flex-1 min-w-0">
            <div className="text-[11px] font-semibold truncate">장한덕 본부장</div>
            <div className="text-[9px] text-slate-400 truncate">LM본부 · 관리자</div>
          </div>
        </div>
      )}
    </aside>
  );
}

/* ============================================================
 * KakaoMap (요구사항 5, 6, 7)
 * - 실제 카카오맵 SDK 사용
 * - mapRef: 지도 객체
 * - overlaysRef: 마커 데이터
 * - 추후 DB 연동 시 BUILDINGS 배열만 fetch 결과로 교체
 * ============================================================ */
function KakaoMap({ buildings, selectedId, onMarkerClick }) {
  const mapRef = useRef(null);
  const overlaysRef = useRef({});
  const [mapStatus, setMapStatus] = useState('loading'); // 'loading' | 'ready' | 'no-key' | 'failed'

  // 지도 초기화 (1회)
  useEffect(() => {
    if (KAKAO_API_KEY === 'YOUR_KAKAO_MAP_API_KEY') {
      setMapStatus('no-key');
      return;
    }

    let cancelled = false;
    let timeoutId;

    const initMap = () => {
      if (cancelled) return;
      window.kakao.maps.load(() => {
        if (cancelled) return;
        const container = document.getElementById('kakao-map-container');
        if (!container) return;
        const map = new window.kakao.maps.Map(container, {
          center: new window.kakao.maps.LatLng(37.52, 127.0),
          level: 9,
        });
        mapRef.current = map;

        // 모든 빌딩이 보이도록 범위 조정
        if (buildings.length > 0) {
          const bounds = new window.kakao.maps.LatLngBounds();
          buildings.forEach(b => bounds.extend(new window.kakao.maps.LatLng(b.lat, b.lng)));
          map.setBounds(bounds);
        }
        setMapStatus('ready');
      });
    };

    if (window.kakao && window.kakao.maps) {
      initMap();
    } else {
      const script = document.createElement('script');
      script.src = `//dapi.kakao.com/v2/maps/sdk.js?appkey=${KAKAO_API_KEY}&autoload=false`;
      script.async = true;
      script.onload = initMap;
      script.onerror = () => { if (!cancelled) setMapStatus('failed'); };
      document.head.appendChild(script);
      // 안전장치: 5초 후에도 안 뜨면 실패
      timeoutId = setTimeout(() => {
        if (!cancelled && mapStatus === 'loading') setMapStatus('failed');
      }, 5000);
    }

    return () => {
      cancelled = true;
      if (timeoutId) clearTimeout(timeoutId);
    };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  // 마커 업데이트 (buildings/selectedId 변경 시)
  useEffect(() => {
    if (mapStatus !== 'ready' || !mapRef.current) return;

    // 기존 오버레이 모두 제거
    Object.values(overlaysRef.current).forEach(o => o.setMap(null));
    overlaysRef.current = {};

    buildings.forEach(b => {
      const isSelected = selectedId === b.id;
      const color = REGION_COLORS[b.region].bg;

      const div = document.createElement('div');
      div.className = 'gm-marker';
      div.style.cursor = 'pointer';
      div.innerHTML = `
        <div style="display:flex;flex-direction:column;align-items:center;transform:translate(0,-100%);">
          <div style="background:${isSelected ? color : '#1E293B'};color:white;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:700;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,0.25);margin-bottom:2px;${isSelected ? 'transform:scale(1.08);' : ''}">
            ${b.name}
          </div>
          <svg width="${isSelected ? 28 : 22}" height="${isSelected ? 38 : 30}" viewBox="0 0 20 28" style="filter:drop-shadow(0 1px 2px rgba(0,0,0,0.35));">
            <path d="M 10 0 C 4.5 0, 0 4.5, 0 10 C 0 16, 10 28, 10 28 C 10 28, 20 16, 20 10 C 20 4.5, 15.5 0, 10 0 Z"
                  fill="${color}" stroke="white" stroke-width="1.5"/>
            <circle cx="10" cy="10" r="3.5" fill="white"/>
          </svg>
        </div>
      `;
      div.onclick = () => onMarkerClick(b.id);

      const overlay = new window.kakao.maps.CustomOverlay({
        position: new window.kakao.maps.LatLng(b.lat, b.lng),
        content: div,
        yAnchor: 1,
        xAnchor: 0.5,
        zIndex: isSelected ? 100 : 10,
      });
      overlay.setMap(mapRef.current);
      overlaysRef.current[b.id] = overlay;
    });
  }, [buildings, selectedId, mapStatus, onMarkerClick]);

  // 선택된 빌딩으로 지도 이동
  useEffect(() => {
    if (mapStatus !== 'ready' || !mapRef.current || !selectedId) return;
    const building = buildings.find(b => b.id === selectedId);
    if (!building) return;
    mapRef.current.panTo(new window.kakao.maps.LatLng(building.lat, building.lng));
  }, [selectedId, buildings, mapStatus]);

  if (mapStatus === 'no-key' || mapStatus === 'failed') {
    return <MapFallback status={mapStatus} buildings={buildings} />;
  }

  return (
    <>
      <div id="kakao-map-container" className="absolute inset-0" />
      {mapStatus === 'loading' && (
        <div className="absolute inset-0 flex items-center justify-center bg-slate-100/80 backdrop-blur-sm pointer-events-none">
          <div className="text-[11px] text-slate-500">카카오맵 로딩 중...</div>
        </div>
      )}
    </>
  );
}

        <div className="grid grid-cols-2 border-b border-slate-100">
          <KV label="NOC" value={building.noc.toLocaleString()} border />
          <KV label="주차" value={building.parking} />
        </div>

        <div className="px-3 py-2.5 border-b border-slate-100">
          <div className="text-[10px] font-bold text-slate-700 mb-1.5">공실 현황</div>
          <div className="grid grid-cols-12 gap-0 text-[8px] font-semibold text-slate-500 uppercase mb-1 pb-1 border-b border-slate-200">
            <div className="col-span-2">층</div>
            <div className="col-span-2 text-right">임대</div>
            <div className="col-span-2 text-right">전용</div>
            <div className="col-span-1 text-right">NOC</div>
            <div className="col-span-3 pl-2">입주 시기</div>
            <div className="col-span-2 text-right">담기</div>
          </div>
          {building.vacancies.map((v, i) => {
            const inCart = isInCart(v);
            return (
              <div key={i} className="grid grid-cols-12 gap-0 text-[9px] py-1 border-b last:border-b-0 border-slate-50 items-center">
                <div className="col-span-2 font-bold">{v.floor}</div>
                <div className="col-span-2 text-right">{v.area}</div>
                <div className="col-span-2 text-right">{v.net}</div>
                <div className="col-span-1 text-right">{v.noc > 0 ? (v.noc/1000).toFixed(0) + 'k' : '-'}</div>
                <div className="col-span-3 pl-2 text-slate-600 truncate">{v.when}</div>
                <div className="col-span-2 text-right">
                  <button onClick={() => onAddVacancy(building, v)} disabled={inCart}
                    className={`text-[8px] font-bold ${inCart ? 'text-slate-400' : 'text-indigo-600 hover:text-indigo-800'}`}>
                    {inCart ? '담김' : '+ 담기'}
                  </button>
                </div>
              </div>
            );
          })}

          <div className="grid grid-cols-12 gap-0 text-[9px] py-1.5 mt-1 bg-slate-50 -mx-3 px-3 items-center font-semibold">
            <div className="col-span-2 font-bold text-slate-800">총 공실</div>
            <div className="col-span-2 text-right">{totalArea.toFixed(0)}</div>
            <div className="col-span-2 text-right">{totalNet.toFixed(0)}</div>
            <div className="col-span-1 text-right">{avgNoc > 0 ? (avgNoc/1000).toFixed(0) + 'k' : '-'}</div>
            <div className="col-span-5 text-right">
              <button onClick={() => onAddAllVacancies(building)}
                className="px-2.5 py-1 text-[9px] font-bold text-white rounded transition hover:opacity-90"
                style={{ backgroundColor: color.bg }}>
                전체 담기
              </button>
            </div>
          </div>
        </div>
      </div>
      <div className="px-3 py-2.5 border-t border-slate-200 flex-shrink-0">
        <button className="w-full py-2 text-[11px] font-bold text-white rounded-lg shadow-sm hover:opacity-90 transition flex items-center justify-center gap-1.5"
          style={{ backgroundColor: color.bg }}>
          건물 상세보기 <ChevronRight size={12} />
        </button>
      </div>
    </section>
  );
}

function KV({ label, value, border }) {
  return (
    <div className={`px-3 py-2 ${border ? 'border-r border-slate-100' : ''}`}>
      <div className="text-[9px] font-semibold text-slate-500 uppercase mb-0.5">{label}</div>
      <div className="text-[11px] font-bold text-slate-900 truncate">{value}</div>
    </div>
  );
}

/* ============================================================
 * CompactList
 * ============================================================ */
function CompactList({ buildings, selectedId, onSelect }) {
  return (
    <aside className="w-[220px] bg-slate-50 border-l border-slate-200 flex flex-col flex-shrink-0">
      <div className="px-3 py-2.5 border-b border-slate-200 bg-white flex items-center justify-between flex-shrink-0">
        <span className="text-[11px] font-bold text-slate-700">간략 리스트</span>
        <span className="text-[10px] font-bold text-slate-500 bg-slate-100 px-1.5 py-0.5 rounded-full">{buildings.length}개</span>
      </div>
      <div className="flex-1 overflow-y-auto p-2 space-y-1.5">
        {buildings.map(b => (
          <CompactItem key={b.id} building={b} selected={selectedId === b.id} onSelect={() => onSelect(b.id)} />
        ))}
      </div>
    </aside>
  );
}

function CompactItem({ building, selected, onSelect }) {
  const color = REGION_COLORS[building.region];
  return (
    <div onClick={onSelect}
      className={`bg-white rounded-lg border overflow-hidden cursor-pointer transition ${selected ? 'border-indigo-400 shadow-md ring-2 ring-indigo-100' : 'border-slate-200 hover:border-slate-300 hover:shadow-sm'}`}>
      <div className="flex gap-2 p-2">
        <div className="w-12 h-12 rounded bg-gradient-to-br from-slate-200 to-slate-300 flex-shrink-0 flex items-center justify-center relative overflow-hidden">
          <ImageIcon size={14} className="text-slate-400" />
          <div className="absolute top-0 left-0 w-1.5 h-full" style={{ backgroundColor: color.bg }} />
        </div>
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-1 mb-0.5">
            <span className="px-1 py-px text-[8px] font-bold rounded" style={{ backgroundColor: color.light, color: color.text }}>{color.name}</span>
            {building.exclusive && <span className="text-[8px] font-bold text-indigo-600">전속</span>}
          </div>
          <div className="text-[10px] font-bold text-slate-900 truncate">{building.name}</div>
          <div className="text-[9px] text-slate-500 truncate flex items-center gap-0.5">
            <MapPin size={8} /> {building.address}
          </div>
        </div>
      </div>
      <div className="grid grid-cols-2 gap-px bg-slate-100">
        <button onClick={(e) => { e.stopPropagation(); onSelect(); }}
          className="py-1.5 text-[10px] font-bold bg-white text-slate-700 hover:bg-slate-50">요약 이동</button>
        <button onClick={(e) => e.stopPropagation()}
          className="py-1.5 text-[10px] font-bold text-white hover:opacity-90"
          style={{ backgroundColor: color.bg }}>상세 이동</button>
      </div>
    </div>
  );
}

/* ============================================================
 * CartDrawer (요구사항 1)
 * ============================================================ */
function CartDrawer({ cart, onClose, onRemove, onClear }) {
  return (
    <>
      <div className="fixed inset-0 bg-black/30 z-40" onClick={onClose} />
      <div className="fixed top-0 right-0 h-full w-[360px] bg-white shadow-2xl z-50 flex flex-col">
        <div className="px-4 py-3 border-b border-slate-200 flex items-center justify-between flex-shrink-0">
          <div className="flex items-center gap-2">
            <ShoppingBag size={16} className="text-indigo-600" />
            <h3 className="font-bold text-[14px]">담긴 매물</h3>
            <span className="text-[10px] font-bold text-slate-500 bg-slate-100 px-1.5 py-0.5 rounded-full">{cart.length}개</span>
          </div>
          <button onClick={onClose} className="p-1 rounded hover:bg-slate-100 text-slate-500">
            <X size={16} />
          </button>
        </div>
        <div className="flex-1 overflow-y-auto">
          {cart.length === 0 ? (
            <div className="flex flex-col items-center justify-center h-full text-center px-6">
              <div className="w-14 h-14 rounded-full bg-slate-100 flex items-center justify-center mb-3">
                <ShoppingBag size={22} className="text-slate-400" />
              </div>
              <div className="text-[13px] font-semibold text-slate-700">담긴 매물이 없습니다</div>
              <div className="text-[11px] text-slate-500 mt-1">
                건물 상세에서 "+ 담기" 또는<br />"전체 담기"를 눌러 추가하세요
              </div>
            </div>
          ) : (
            <div className="p-3 space-y-2">
              {cart.map(item => {
                const color = REGION_COLORS[item.region];
                return (
                  <div key={item.id} className="bg-slate-50 rounded-lg border border-slate-200 p-2.5">
                    <div className="flex items-start justify-between gap-2 mb-1.5">
                      <div className="min-w-0 flex-1">
                        <div className="flex items-center gap-1 mb-0.5">
                          <span className="px-1 py-px text-[8px] font-bold rounded" style={{ backgroundColor: color.light, color: color.text }}>{color.name}</span>
                          <span className="text-[8px] font-bold text-slate-500">{item.floor}</span>
                        </div>
                        <div className="text-[12px] font-bold text-slate-900 truncate">{item.buildingName}</div>
                      </div>
                      <button onClick={() => onRemove(item.id)}
                        className="p-1 rounded hover:bg-rose-50 text-slate-400 hover:text-rose-600 flex-shrink-0">
                        <Trash2 size={12} />
                      </button>
                    </div>
                    <div className="grid grid-cols-4 gap-1.5 text-center bg-white rounded p-1.5 border border-slate-100">
                      <div>
                        <div className="text-[8px] text-slate-500">임대</div>
                        <div className="text-[10px] font-bold">{item.area}</div>
                      </div>
                      <div>
                        <div className="text-[8px] text-slate-500">전용</div>
                        <div className="text-[10px] font-bold">{item.net}</div>
                      </div>
                      <div>
                        <div className="text-[8px] text-slate-500">NOC</div>
                        <div className="text-[10px] font-bold">{item.noc > 0 ? (item.noc/1000).toFixed(0)+'k' : '-'}</div>
                      </div>
                      <div>
                        <div className="text-[8px] text-slate-500">입주</div>
                        <div className="text-[10px] font-bold truncate" title={item.when}>{item.when}</div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
        {cart.length > 0 && (
          <div className="px-4 py-3 border-t border-slate-200 flex items-center justify-between gap-2 flex-shrink-0">
            <button onClick={onClear}
              className="text-[11px] text-slate-500 hover:text-rose-600">전체 비우기</button>
            <button className="px-3 py-1.5 text-[11px] font-bold bg-indigo-600 text-white rounded-md hover:bg-indigo-700">
              매물 리스트 작성 ({cart.length})
            </button>
          </div>
        )}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<GenstarMate />);
})();
</script>
</body>
</html>
