/* ===== 필터 (요구사항 8 - 그대로 유지) ===== */
const FILTER_DEFS = [
  { key: 'totalArea',     label: '전체 공실 전용',             unit: '평',    type: 'range' },
  { key: 'baseFloorArea', label: '층 공실 전용',               unit: '평',    type: 'range' },
  { key: 'netArea',       label: '기준층 전용',                unit: '평',    type: 'range' },
  { key: 'monthlyFee',    label: '월 고정비',                  unit: '원/평', type: 'range' },
  { key: 'deposit',       label: '보증금',                     unit: '원/평', type: 'range' },
  { key: 'noc',           label: 'NOC',                        unit: '',      type: 'range' },
  { key: 'exclusive',     label: '전속',                       type: 'yn' },
  { key: 'floors',        label: '층수',                       type: 'multi', options: ['1층', '지하층', '지상층(1층 제외)'] },
  { key: 'vacancy',       label: '공실',                       type: 'yn' },
  { key: 'parking',       label: '주차',                       type: 'multi', options: ['자주식', '기계식', '혼용'] },
];

const INITIAL_FILTERS = FILTER_DEFS.reduce((acc, def) => {
  acc[def.key] = def.type === 'range' ? { min: '', max: '' } : (def.type === 'multi' ? [] : null);
  return acc;
}, {});

/* ============================================================
 * 카트(담긴 매물) 헬퍼 - 추후 엑셀/콤프 출력에 사용 가능 (요구사항 1)
 * ============================================================ */
const cartHelpers = {
  buildCartItem: (building, vacancy) => ({
    id: `${building.id}-${vacancy.floor}`,
    buildingId: building.id,
    buildingName: building.name,
    address: building.address,
    region: building.region,
    floor: vacancy.floor,
    area: vacancy.area,
    net: vacancy.net,
    noc: vacancy.noc,
    when: vacancy.when,
    addedAt: Date.now(),
  }),
  // 추후 엑셀 비교표용
  toCSV: (cart) => {
    const headers = ['빌딩명', '주소', '권역', '층', '임대면적(평)', '전용면적(평)', 'NOC', '입주시기'];
    const rows = cart.map(i => [i.buildingName, i.address, i.region, i.floor, i.area, i.net, i.noc, i.when]);
    return [headers, ...rows].map(r => r.join(',')).join('\n');
  },
};

/* ===== 빌딩 표시 헬퍼 ===== */
const formatFloors = (b) => `B${b.belowFloors}/${b.aboveFloors}F`;
const formatBuilt  = (b) => b.renovated ? `${b.built} / ${b.renovated}` : `${b.built}`;
const sumVacancyArea = (b) => b.vacancies.reduce((s, v) => s + v.area, 0);
const sumVacancyNet  = (b) => b.vacancies.reduce((s, v) => s + v.net, 0);
const avgVacancyNoc  = (b) => b.vacancies.length > 0
  ? Math.round(b.vacancies.reduce((s, v) => s + v.noc, 0) / b.vacancies.length) : 0;

/* ============================================================
 * Main
 * ============================================================ */
function GenstarMate() {
  const [selectedId, setSelectedId]       = useState(1);
  const [sidebarOpen, setSidebarOpen]     = useState(true);
  const [filters, setFilters]             = useState(INITIAL_FILTERS);
  const [openFilterKey, setOpenFilterKey] = useState(null);
  const [activeRegions, setActiveRegions] = useState(['CBD', 'GBD', 'YBD', 'BBD', 'OTHERS', 'OUT']);
  const [photoIdx, setPhotoIdx]           = useState(0);
  const [cart, setCart]                   = useState([]);
  const [cartOpen, setCartOpen]           = useState(false);
  const [detailOpen, setDetailOpen]       = useState(true);
  const [compareOpen, setCompareOpen]     = useState(false);
  const [pageView, setPageView]           = useState('map'); // 'map' | 'detail'

  const resetFilters = () => {
    setFilters(INITIAL_FILTERS);
    setActiveRegions(['CBD', 'GBD', 'YBD', 'BBD', 'OTHERS', 'OUT']);
    setOpenFilterKey(null);
  };

  const visibleBuildings = useMemo(
    () => BUILDINGS.filter(b => {
      // 권역
      if (!activeRegions.includes(b.region)) return false;

      // 총 공실 전용 (평) — 모든 공실의 전용면적 합산
      const ta = filters.totalArea;
      const totalVacNet = b.vacancies.reduce((s, v) => s + (v.net || 0), 0);
      if (ta.min !== '' && +ta.min > 0 && totalVacNet < +ta.min) return false;
      if (ta.max !== '' && +ta.max > 0 && totalVacNet > +ta.max) return false;

      // 층 공실 전용 (평) — 개별 층 공실 전용면적 중 하나라도 범위 안에 들면 통과
      const bfa = filters.baseFloorArea;
      if (bfa.min !== '' && +bfa.min > 0 && !b.vacancies.some(v => (v.net || 0) >= +bfa.min)) return false;
      if (bfa.max !== '' && +bfa.max > 0 && !b.vacancies.some(v => (v.net || 0) <= +bfa.max)) return false;

      // 기준층 전용 (평)
      const na = filters.netArea;
      if (na.min !== '' && +na.min > 0 && b.baseNet < +na.min) return false;
      if (na.max !== '' && +na.max > 0 && b.baseNet > +na.max) return false;

      // 월 고정비 (원/평) — NOC 사용
      const mf = filters.monthlyFee;
      if (mf.min !== '' && +mf.min > 0 && b.noc < +mf.min) return false;
      if (mf.max !== '' && +mf.max > 0 && b.noc > +mf.max) return false;

      // 보증금 (원/평) — 통상 월 임대료의 10배
      const dp = filters.deposit;
      const depositVal = b.noc * 10;
      if (dp.min !== '' && +dp.min > 0 && depositVal < +dp.min) return false;
      if (dp.max !== '' && +dp.max > 0 && depositVal > +dp.max) return false;

      // NOC — 공실 현황의 NOC 값 기준 (NOC 값이 없는 빌딩은 필터 무관하게 항상 통과)
      const nc = filters.noc;
      const hasAnyNoc = b.vacancies.some(v => v.noc && v.noc > 0);
      if (hasAnyNoc) {
        if (nc.min !== '' && +nc.min > 0 && !b.vacancies.some(v => v.noc && v.noc >= +nc.min)) return false;
        if (nc.max !== '' && +nc.max > 0 && !b.vacancies.some(v => v.noc && v.noc <= +nc.max)) return false;
      }

      // 전속 Y/N
      if (filters.exclusive === 'Y' && !b.exclusive) return false;
      if (filters.exclusive === 'N' && b.exclusive) return false;

      // 층수 (공실 층 기준)
      if (filters.floors.length > 0) {
        const hasMatch = b.vacancies.some(v => {
          const f = v.floor;
          const isB1 = f.includes('지하');
          const is1F = /^1층|^1F\b/.test(f);
          const isOver1 = !isB1 && !is1F;
          if (filters.floors.includes('1층') && is1F) return true;
          if (filters.floors.includes('지하층') && isB1) return true;
          if (filters.floors.includes('지상층(1층 제외)') && isOver1) return true;
          return false;
        });
        if (!hasMatch) return false;
      }

      // 공실 Y/N
      const hasVacancy = b.vacancies.length > 0;
      if (filters.vacancy === 'Y' && !hasVacancy) return false;
      if (filters.vacancy === 'N' && hasVacancy) return false;

      // 주차
      if (filters.parking.length > 0 && !filters.parking.includes(b.parking)) return false;

      return true;
    }),
    [activeRegions, filters]
  );

  const selected = BUILDINGS.find(b => b.id === selectedId) || BUILDINGS[0];

  const hasFilterValue = (key) => {
    const v = filters[key];
    if (!v) return false;
    if (Array.isArray(v)) return v.length > 0;
    if (typeof v === 'object') return v.min || v.max;
    return true;
  };

  // 카트 핸들러
  const addToCart = useCallback((building, vacancy) => {
    setCart(prev => {
      const item = cartHelpers.buildCartItem(building, vacancy);
      return prev.find(i => i.id === item.id) ? prev : [...prev, item];
    });
  }, []);

  const addAllVacancies = useCallback((building) => {
    setCart(prev => {
      const newItems = building.vacancies
        .map(v => cartHelpers.buildCartItem(building, v))
        .filter(item => !prev.find(e => e.id === item.id));
      return [...prev, ...newItems];
    });
  }, []);

  const removeFromCart = useCallback((id) => setCart(prev => prev.filter(i => i.id !== id)), []);
  const clearCart      = useCallback(() => setCart([]), []);

  const handleSelectBuilding = useCallback((id) => {
    setSelectedId(id);
    setPhotoIdx(0);
  }, []);

  return (
    <div className="h-screen flex bg-slate-50 text-slate-800 overflow-hidden text-[13px]">
      <Sidebar open={sidebarOpen} onToggle={() => setSidebarOpen(!sidebarOpen)}
        currentPage={pageView} onNavigate={setPageView} />
      <div className="flex-1 flex flex-col min-w-0">
        {pageView !== 'detail' && (
          <FilterBar filters={filters} setFilters={setFilters}
            openFilterKey={openFilterKey} setOpenFilterKey={setOpenFilterKey}
            hasFilterValue={hasFilterValue}
            activeRegions={activeRegions} setActiveRegions={setActiveRegions}
            resetFilters={resetFilters}
            cartCount={cart.length} onCartClick={() => setCartOpen(true)}
            pageView={pageView} />
        )}
        {pageView === 'map' ? (
          <main className="flex-1 flex overflow-hidden min-h-0">
            <div className="relative bg-slate-100 min-w-0" style={{ height: '100%', flex: 1, overflow: 'hidden' }}>
              <KakaoMap
                buildings={visibleBuildings}
                selectedId={selectedId}
                onMarkerClick={handleSelectBuilding} />
              <MapLegend />
              <MapStats count={visibleBuildings.length} regionCount={activeRegions.length} />
            </div>
            {detailOpen ? (
              <DetailCard building={selected} photoIdx={photoIdx} setPhotoIdx={setPhotoIdx}
                onAddVacancy={addToCart} onAddAllVacancies={addAllVacancies} cart={cart}
                onCollapse={() => setDetailOpen(false)}
                onOpenDetail={() => setPageView('detail')} />
            ) : (
              <button onClick={() => setDetailOpen(true)}
                className="w-8 bg-white border-l border-slate-200 flex flex-col items-center justify-center gap-2 hover:bg-slate-50 transition flex-shrink-0 group">
                <PanelLeftOpen size={14} className="text-slate-400 group-hover:text-indigo-600" />
                <div className="text-[10px] font-semibold text-slate-500 group-hover:text-indigo-600" style={{writingMode:'vertical-rl'}}>상세 패널 펼치기</div>
              </button>
            )}
            <CompactList buildings={visibleBuildings} selectedId={selectedId}
              onSelect={handleSelectBuilding}
              onOpenDetail={(id) => { setSelectedId(id); setPageView('detail'); }} />
          </main>
        ) : pageView === 'detail' ? (
          <BuildingDetailPage building={selected}
            onBack={() => setPageView('map')}
            onAddVacancy={addToCart}
            onAddAllVacancies={addAllVacancies}
            cart={cart} />
        ) : (
          <AllBuildingsPage buildings={visibleBuildings} filters={filters}
            onOpenDetail={(id) => { setSelectedId(id); setPageView('detail'); }}
            onAddVacancy={addToCart}
            cart={cart} />
        )}
      </div>

      {cartOpen && (
        <CartDrawer cart={cart} onClose={() => setCartOpen(false)}
          onRemove={removeFromCart} onClear={clearCart}
          onCompare={() => { setCartOpen(false); setCompareOpen(true); }} />
      )}

      {compareOpen && (
        <CompareView cart={cart} buildings={BUILDINGS}
          onClose={() => setCompareOpen(false)}
          onRemove={removeFromCart} />
      )}
    </div>
  );
}

/* ============================================================
 * Sidebar (요구사항 2)
 * ============================================================ */
function Sidebar({ open, onToggle, currentPage, onNavigate }) {
  // child label → pageView 매핑
  const CHILD_TO_PAGE = { '지도': 'map', '전체 빌딩': 'allBuildings' };
  const PAGE_TO_CHILD = { 'map': '지도', 'detail': '지도', 'allBuildings': '전체 빌딩' };
  const activeChild = PAGE_TO_CHILD[currentPage] || '지도';

  const initialExpanded = useMemo(() => {
    const exp = {};
    NAV_SECTIONS.forEach(section => {
      section.items.forEach(item => {
        if (item.children) exp[item.label] = !!item.active;
      });
    });
    return exp;
  }, []);
  const [expanded, setExpanded] = useState(initialExpanded);
  const toggle = (label) => setExpanded(prev => ({ ...prev, [label]: !prev[label] }));

  return (
    <aside className={`bg-gradient-to-b from-slate-900 to-slate-800 text-slate-100 flex flex-col flex-shrink-0 transition-all duration-200 ${open ? 'w-48' : 'w-12'}`}>

          <div>

        <button onClick={onToggle} className="p-1 rounded hover:bg-slate-700/40 text-slate-400 hover:text-white">
          {open ? <PanelLeftClose size={14} /> : <PanelLeftOpen size={14} />}
        </button>
      </div>
      <nav className="flex-1 overflow-y-auto py-2">
        {NAV_SECTIONS.map(section => (
          <div key={section.group} className="mb-3">
            {open && <div className="px-3 text-[9px] font-semibold text-slate-500 uppercase tracking-wider mb-1">{section.group}</div>}
            {section.items.map(item => {
              const Icon = item.icon;
              const hasChildren = !!item.children;
              const isExpanded = hasChildren ? !!expanded[item.label] : false;
              return (
                <div key={item.label}>
                  <div onClick={() => hasChildren && toggle(item.label)}
                    className={`flex items-center gap-2 px-3 py-1.5 text-[12px] cursor-pointer transition select-none ${item.active ? 'text-white bg-slate-700/30' : 'text-slate-300 hover:bg-slate-700/30'}`}>
                    <Icon size={13} strokeWidth={1.75} />
                    {open && <span className="font-medium flex-1">{item.label}</span>}
                    {open && hasChildren && (
                      <ChevronDown size={11} className="text-slate-400 transition-transform duration-200"
                        style={{ transform: isExpanded ? 'rotate(180deg)' : 'rotate(0deg)' }} />
                    )}
                  </div>
                  {open && hasChildren && isExpanded && (
                    <div className="ml-6 mb-1">
                      {item.children.map(child => {
                        const isActive = activeChild === child;
                        const pageKey = CHILD_TO_PAGE[child];
                        return (
                          <div key={child}
                            onClick={() => pageKey && onNavigate && onNavigate(pageKey)}
                            className={`px-3 py-1 text-[11px] cursor-pointer transition ${isActive ? 'text-indigo-300 font-semibold border-l-2 border-indigo-400 pl-2.5' : 'text-slate-400 hover:text-slate-200'}`}>
                            {child}
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        ))}
      </nav>
      {open && (
        <div className="px-3 py-2 border-t border-slate-700/40 flex items-center gap-2 flex-shrink-0">
          <div className="w-7 h-7 rounded-full bg-gradient-to-br from-indigo-400 to-purple-500 flex items-center justify-center text-[10px] font-bold flex-shrink-0">LM</div>
          <div className="flex-1 min-w-0">
            <div className="text-[11px] font-semibold truncate">장한덕 본부장</div>
            <div className="text-[9px] text-slate-400 truncate">LM본부 · 관리자</div>
          </div>
        </div>
      )}
    </aside>
  );
}

/* ============================================================
 * KakaoMap (요구사항 5, 6, 7) - 단순화된 초기화
 * ============================================================ */
function KakaoMap({ buildings, selectedId, onMarkerClick }) {
  console.log("KAKAO MAP COMPONENT RENDERING - buildings:", buildings.length);
  const mapRef = useRef(null);
  const overlaysRef = useRef({});
  const [mapReady, setMapReady] = useState(false);
  // 주소 → 좌표 자동 변환 결과 캐시 (id → {lat, lng})
  const [geocoded, setGeocoded] = useState({});
  const [geoStatus, setGeoStatus] = useState({ done: 0, total: 0, failed: [] });

  // 주소 기준 좌표 얻기 (지오코딩 결과가 있으면 그것, 없으면 수동 입력값)
  const resolvePos = useCallback((b) => {
    const g = geocoded[b.id];
    return g ? { lat: g.lat, lng: g.lng } : { lat: b.lat, lng: b.lng };
  }, [geocoded]);

  // 지도 초기화 + 모든 빌딩 주소 지오코딩 (1회)
  useEffect(() => {
    if (!window.kakao || !window.kakao.maps) return;

    window.kakao.maps.load(() => {
      const container = document.getElementById('kakao-map');
      if (!container) return;

      const options = {
        center: new window.kakao.maps.LatLng(37.5400, 127.0500),
        level: 8,   // 고정 축적 (1=가장확대 ~ 14=가장축소)
      };
      const map = new window.kakao.maps.Map(container, options);
      mapRef.current = map;

      setTimeout(() => {
        if (!mapRef.current) return;
        mapRef.current.relayout();

        // ===== 지오코딩: 모든 빌딩 주소를 좌표로 변환 (축적은 그대로 유지) =====
        if (window.kakao.maps.services && window.kakao.maps.services.Geocoder) {
          const geocoder = new window.kakao.maps.services.Geocoder();
          setGeoStatus({ done: 0, total: BUILDINGS.length, failed: [] });

          let done = 0;
          const failed = [];
          BUILDINGS.forEach(b => {
            geocoder.addressSearch(b.address, (result, status) => {
              done += 1;
              if (status === window.kakao.maps.services.Status.OK && result[0]) {
                const r = result[0];
                setGeocoded(prev => ({ ...prev, [b.id]: { lat: parseFloat(r.y), lng: parseFloat(r.x) } }));
                console.log(`[geocode OK] ${b.name}: ${r.y}, ${r.x}`);
              } else {
                failed.push(b);
                console.warn(`[geocode FAIL] status=${status} ${b.name} (${b.address})`);
              }
              setGeoStatus({ done, total: BUILDINGS.length, failed: [...failed] });
            });
          });
        }
      }, 100);

      setMapReady(true);
    });
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  // 지오코딩 완료 시 setBounds 호출하지 않음 — 초기 축적 유지
  // (사용자 요청: 지도 처음 구현할때 축적도 고정)

  // 마커 업데이트 (buildings/selectedId/지오코딩 변경 시)
  useEffect(() => {
    if (!mapReady || !mapRef.current) return;

    // 기존 오버레이 모두 제거
    Object.values(overlaysRef.current).forEach(o => o.setMap(null));
    overlaysRef.current = {};

    buildings.forEach(b => {
      const isSelected = selectedId === b.id;
      const color = REGION_COLORS[b.region].bg;
      const pos = resolvePos(b);

      const div = document.createElement('div');
      div.className = 'gm-marker';
      div.style.cursor = 'pointer';
      div.innerHTML = `
        <div style="display:flex;flex-direction:column;align-items:center;transform:translate(0,-100%);">
          <div style="background:${color};color:white;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:700;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,0.25);margin-bottom:2px;${isSelected ? 'transform:scale(1.12);outline:2px solid white;outline-offset:2px;' : ''}">
            ${b.name}
          </div>
          <svg width="${isSelected ? 28 : 22}" height="${isSelected ? 38 : 30}" viewBox="0 0 20 28" style="filter:drop-shadow(0 1px 2px rgba(0,0,0,0.35));">
            <path d="M 10 0 C 4.5 0, 0 4.5, 0 10 C 0 16, 10 28, 10 28 C 10 28, 20 16, 20 10 C 20 4.5, 15.5 0, 10 0 Z"
                  fill="${color}" stroke="white" stroke-width="1.5"/>
            <circle cx="10" cy="10" r="3.5" fill="white"/>
          </svg>
        </div>
      `;
      div.onclick = () => onMarkerClick(b.id);

      const overlay = new window.kakao.maps.CustomOverlay({
        position: new window.kakao.maps.LatLng(pos.lat, pos.lng),
        content: div,
        yAnchor: 1,
        xAnchor: 0.5,
        zIndex: isSelected ? 100 : 10,
      });
      overlay.setMap(mapRef.current);
      overlaysRef.current[b.id] = overlay;
    });
  }, [buildings, selectedId, mapReady, geocoded, onMarkerClick, resolvePos]);

  // 선택된 빌딩으로 지도 이동
  useEffect(() => {
    if (!mapReady || !mapRef.current || !selectedId) return;
    const building = buildings.find(b => b.id === selectedId);
    if (!building) return;
    const pos = resolvePos(building);
    mapRef.current.panTo(new window.kakao.maps.LatLng(pos.lat, pos.lng));
  }, [selectedId, buildings, mapReady, geocoded, resolvePos]);

  return (
    <>
      <div
        id="kakao-map"
        style={{
          width: '100%',
          height: '100%',
          background: '#e8eef5',
        }}
      />
      {/* 지오코딩 진행/실패 표시 */}
      {geoStatus.total > 0 && geoStatus.done < geoStatus.total && (
        <div className="absolute top-4 right-4 z-20 bg-white/95 backdrop-blur-sm rounded-lg shadow-md border border-slate-200 px-3 py-1.5">
          <div className="text-[10px] font-semibold text-slate-700">
            주소 좌표 변환 중... <span className="text-indigo-600 font-bold">{geoStatus.done}/{geoStatus.total}</span>
          </div>
        </div>
      )}
      {geoStatus.total > 0 && geoStatus.done === geoStatus.total && geoStatus.failed.length > 0 && (
        <div className="absolute top-4 right-4 z-20 bg-amber-50 border border-amber-200 rounded-lg shadow-md px-3 py-1.5 max-w-[260px]">
          <div className="text-[10px] font-bold text-amber-800 mb-0.5">⚠ 주소 변환 실패 {geoStatus.failed.length}건</div>
          <div className="text-[9px] text-amber-700 leading-tight">
            {geoStatus.failed.map(f => f.name).join(', ')} — 수동 좌표 사용 중
          </div>
        </div>
      )}
    </>
  );
}

/* ============================================================
 * CompareView - 매물 비교표 (엑셀 템플릿과 동일 구조)
 * ============================================================ */
function CompareView({ cart, buildings, onClose, onRemove }) {
  // 카트를 빌딩별로 그룹화
  const groups = useMemo(() => {
    const map = {};
    cart.forEach(item => {
      if (!map[item.buildingId]) {
        const b = buildings.find(x => x.id === item.buildingId);
        map[item.buildingId] = { building: b, items: [] };
      }
      map[item.buildingId].items.push(item);
    });
    return Object.values(map);
  }, [cart, buildings]);

  // 편집 가능 셀 상태 (groupId-field 키)
  const [edits, setEdits] = useState({});
  const editKey = (gid, field) => `${gid}-${field}`;
  const getEdit = (gid, field, defaultVal) => {
    const k = editKey(gid, field);
    return edits[k] !== undefined ? edits[k] : defaultVal;
  };
  const setEdit = (gid, field, val) => setEdits(prev => ({ ...prev, [editKey(gid, field)]: val }));

  const [presentTo, setPresentTo] = useState('그레이츠 강남');

  // 컬럼별 계산값
  const computeCol = (g) => {
    const b = g.building;
    const items = g.items;
    const vacAreaSum = items.reduce((s,i) => s+(+i.area||0), 0);
    const vacNetSum  = items.reduce((s,i) => s+(+i.net||0), 0);
    const floors     = items.map(i => i.floor).join(', ');

    const propArea = +getEdit(b.id, 'propArea', vacAreaSum.toFixed(2));
    const propNet  = +getEdit(b.id, 'propNet',  vacNetSum.toFixed(2));
    const propFloors = getEdit(b.id, 'propFloors', floors);

    // 임대료/관리비/보증금 (NOC에서 분해 — 78/22 비율 가정, 보증금=임대료×10)
    const rentPerPy   = Math.round(b.noc * 0.78);
    const mgmtPerPy   = Math.round(b.noc * 0.22);
    const depositPerPy = rentPerPy * 10;

    const rf       = +getEdit(b.id, 'rf', 0)       || 0;
    const fitOut   = +getEdit(b.id, 'fitOut', 0)   || 0;
    const ti       = +getEdit(b.id, 'ti', 0)       || 0;

    const monthlyRent = propArea * rentPerPy;
    const monthlyMgmt = propArea * mgmtPerPy;
    const occMonths   = 60 + fitOut;
    const tiToRfMonths = monthlyRent > 0 ? ti / monthlyRent : 0;
    const totalRfMonths = rf + fitOut + tiToRfMonths;
    const monthlyRentAfterRf = occMonths > 0 ? monthlyRent * (occMonths - totalRfMonths) / occMonths : 0;
    const monthlyTotalAfter = monthlyRentAfterRf + monthlyMgmt;
    const eNoc = propNet > 0 ? monthlyTotalAfter / propNet : 0;

    return {
      b, items,
      vacAreaSum, vacNetSum,
      propArea, propNet, propFloors,
      rentPerPy, mgmtPerPy, depositPerPy,
      rf, fitOut, ti,
      monthlyRent, monthlyMgmt,
      occMonths, tiToRfMonths, totalRfMonths,
      monthlyRentAfterRf, monthlyTotalAfter, eNoc,
    };
  };

  const cols = groups.map(computeCol);

  const fmt = (n, dec = 0) => {
    if (!isFinite(n)) return '-';
    return Math.round(n * Math.pow(10, dec)) / Math.pow(10, dec);
  };
  const fmtKR = (n) => {
    if (!isFinite(n) || n === 0) return '0';
    return Math.round(n).toLocaleString();
  };

  // 엑셀 다운로드
  const downloadExcel = () => {
    if (!window.XLSX) { alert('엑셀 라이브러리 로딩 중입니다. 잠시 후 다시 시도하세요.'); return; }

    // AOA(Array of Arrays) 방식으로 엑셀 시트 구성
    const rows = [];
    const N = cols.length;
    const blank = Array(N).fill('');

    // 빌딩명 헤더 컬럼
    const colHeaders = cols.map(c => c.b.name);

    rows.push(['PRESENT TO :', '', presentTo, ...Array(N-1).fill('')]);
    rows.push(['', '', '', ...Array(N-1).fill('')]);
    rows.push(['', '빌딩명', ...colHeaders]);
    rows.push(['자산개요', '도로명 주소',          ...cols.map(c => c.b.address)]);
    rows.push(['',         '준공년도 / 리모델링', ...cols.map(c => c.b.renovated ? `${c.b.built} / ${c.b.renovated}` : `${c.b.built}`)]);
    rows.push(['',         '빌딩 규모',           ...cols.map(c => `B${c.b.belowFloors}/${c.b.aboveFloors}F`)]);
    rows.push(['',         '연면적 (평)',          ...cols.map(c => c.b.area)]);
    rows.push(['',         '전용률 (%)',           ...cols.map(c => `${c.b.occupancy}%`)]);
    rows.push(['',         '기준층 임대면적 (평)', ...cols.map(c => c.b.baseLease)]);
    rows.push(['',         '기준층 전용면적 (평)', ...cols.map(c => c.b.baseNet)]);
    rows.push(['', '', ...blank]);
    rows.push(['주차', '주차 방식',         ...cols.map(c => c.b.parking)]);
    rows.push(['',     '총 주차 대수',      ...cols.map(c => Math.round(c.b.area * 0.012) + '대')]);
    rows.push(['',     '무료 주차 비율',    ...cols.map(_ => '1대/70평')]);
    rows.push(['', '', ...blank]);
    rows.push(['공실면적', '임대면적 합계 (평)', ...cols.map(c => c.vacAreaSum)]);
    rows.push(['',         '전용면적 합계 (평)', ...cols.map(c => c.vacNetSum)]);
    rows.push(['', '', ...blank]);
    rows.push(['제안면적 ✏️', '임대면적 (평) ✏️', ...cols.map(c => c.propArea)]);
    rows.push(['',            '전용면적 (평) ✏️', ...cols.map(c => c.propNet)]);
    rows.push(['',            '제안층 ✏️',         ...cols.map(c => c.propFloors)]);
    rows.push(['', '', ...blank]);
    rows.push(['기준단가 (평)', '보증금', ...cols.map(c => c.depositPerPy)]);
    rows.push(['',             '임대료', ...cols.map(c => c.rentPerPy)]);
    rows.push(['',             '관리비', ...cols.map(c => c.mgmtPerPy)]);
    rows.push(['', '', ...blank]);
    rows.push(['임대조건 ✏️', 'Rent Free (개월) ✏️', ...cols.map(c => c.rf)]);
    rows.push(['',            'Fit-Out (개월) ✏️',   ...cols.map(c => c.fitOut)]);
    rows.push(['',            'T.I (인테리어 현금지원, 원) ✏️', ...cols.map(c => c.ti)]);
    rows.push(['', '', ...blank]);
    rows.push(['자동계산', '월 임대료 (RF 전)',      ...cols.map(c => Math.round(c.monthlyRent))]);
    rows.push(['',         '월 관리비',               ...cols.map(c => Math.round(c.monthlyMgmt))]);
    rows.push(['',         '점유기간 (개월)',         ...cols.map(c => c.occMonths)]);
    rows.push(['',         'TI → RF 환산 (개월)',     ...cols.map(c => +c.tiToRfMonths.toFixed(2))]);
    rows.push(['',         '총 RF 환산 (개월)',       ...cols.map(c => +c.totalRfMonths.toFixed(2))]);
    rows.push(['',         '월 임대료 (RF 반영 후)',  ...cols.map(c => Math.round(c.monthlyRentAfterRf))]);
    rows.push(['',         '월 임관리비 합계',         ...cols.map(c => Math.round(c.monthlyTotalAfter))]);
    rows.push(['E.NOC', 'E.NOC (점유기간 기준, 원/평/월)', ...cols.map(c => Math.round(c.eNoc))]);
    rows.push(['', '', ...blank]);
    rows.push(['컨택포인트', '담당자 / 연락처', ...Array(N).fill('장한덕 본부장  010-2240-2321\n박환웅 이사  010-9238-7475')]);
    rows.push(['', '', ...blank]);
    rows.push(['공실 상세 (선택층)', '층 / 임대면적 / 전용면적 / 입주시기',
      ...cols.map(c => c.items.map(i => `[${i.floor}] 임대:${i.area}평 / 전용:${i.net}평 / ${i.when}`).join('\n'))
    ]);

    const ws = window.XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{wch: 13}, {wch: 26}, ...Array(N).fill({wch: 22})];

    const wb = window.XLSX.utils.book_new();
    window.XLSX.utils.book_append_sheet(wb, ws, '빌딩 비교표');

    const today = new Date();
    const ymd = `${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}`;
    window.XLSX.writeFile(wb, `GenstarMate_빌딩비교표_${ymd}.xlsx`);
  };

  if (cols.length === 0) {
    return (
      <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center" onClick={onClose}>
        <div className="bg-white rounded-2xl p-8 max-w-md text-center" onClick={e => e.stopPropagation()}>
          <ShoppingBag size={32} className="text-slate-300 mx-auto mb-2" />
          <div className="font-bold text-slate-700 mb-1">담긴 매물이 없습니다</div>
          <div className="text-[12px] text-slate-500 mb-4">먼저 카트에 매물을 담아주세요</div>
          <button onClick={onClose} className="px-4 py-2 text-[12px] bg-slate-700 text-white rounded-md">닫기</button>
        </div>
      </div>
    );
  }

  return (
    <div className="fixed inset-0 bg-slate-900/60 z-50 flex flex-col">
      <div className="bg-white px-5 py-3 border-b border-slate-200 flex items-center justify-between flex-shrink-0">
        <div className="flex items-center gap-3">

                        <span>{c.b.name}</span>

                      <button onClick={() => c.items.forEach(i => onRemove(i.id))}

            <tbody>
              <CompareSection title="자산개요" rows={[

                ['빌딩 규모',           cols.map(c => `B${c.b.belowFloors}/${c.b.aboveFloors}F`)],
                ['연면적 (평)',          cols.map(c => c.b.area.toLocaleString())],
                ['전용률 (%)',           cols.map(c => `${c.b.occupancy}%`)],
                ['기준층 임대면적 (평)', cols.map(c => c.b.baseLease)],
                ['기준층 전용면적 (평)', cols.map(c => c.b.baseNet)],
              ]} />

              <CompareSection title="주차" rows={[
                ['주차 방식',      cols.map(c => c.b.parking)],
                ['총 주차 대수',   cols.map(c => Math.round(c.b.area * 0.012) + '대')],
                ['무료 주차 비율', cols.map(_ => '1대/70평')],
              ]} />

              <CompareSection title="공실면적" rows={[
                ['임대면적 합계 (평)', cols.map(c => c.vacAreaSum.toFixed(2))],
                ['전용면적 합계 (평)', cols.map(c => c.vacNetSum.toFixed(2))],
              ]} />

              <CompareSection title="제안면적 ✏️" highlight rows={[
                ['임대면적 (평) ✏️', cols.map((c,i) => <EditCell key={i} value={c.propArea} onChange={v => setEdit(c.b.id, 'propArea', v)} type="number" />)],
                ['전용면적 (평) ✏️', cols.map((c,i) => <EditCell key={i} value={c.propNet}  onChange={v => setEdit(c.b.id, 'propNet', v)}  type="number" />)],
                ['제안층 ✏️',         cols.map((c,i) => <EditCell key={i} value={c.propFloors} onChange={v => setEdit(c.b.id, 'propFloors', v)} />)],
              ]} />

              <CompareSection title="기준단가 (평)" rows={[
                ['보증금', cols.map(c => fmtKR(c.depositPerPy))],
                ['임대료', cols.map(c => fmtKR(c.rentPerPy))],
                ['관리비', cols.map(c => fmtKR(c.mgmtPerPy))],
              ]} />

              <CompareSection title="임대조건 ✏️" highlight rows={[
                ['Rent Free (개월) ✏️',          cols.map((c,i) => <EditCell key={i} value={c.rf}     onChange={v => setEdit(c.b.id, 'rf', v)} type="number" />)],
                ['Fit-Out (개월) ✏️',            cols.map((c,i) => <EditCell key={i} value={c.fitOut} onChange={v => setEdit(c.b.id, 'fitOut', v)} type="number" />)],
                ['T.I (인테리어 현금지원, 원) ✏️', cols.map((c,i) => <EditCell key={i} value={c.ti}     onChange={v => setEdit(c.b.id, 'ti', v)} type="number" />)],
              ]} />

              <CompareSection title="자동계산" calc rows={[
                ['월 임대료 (RF 전)',     cols.map(c => fmtKR(c.monthlyRent))],
                ['월 관리비',              cols.map(c => fmtKR(c.monthlyMgmt))],
                ['점유기간 (개월)',         cols.map(c => c.occMonths)],
                ['TI → RF 환산 (개월)',     cols.map(c => c.tiToRfMonths.toFixed(2))],
                ['총 RF 환산 (개월)',       cols.map(c => c.totalRfMonths.toFixed(2))],
                ['월 임대료 (RF 반영 후)',  cols.map(c => fmtKR(c.monthlyRentAfterRf))],
                ['월 임관리비 합계',         cols.map(c => fmtKR(c.monthlyTotalAfter))],
              ]} />

              <tr>
                <td className="bg-indigo-700 text-white px-3 py-3 font-bold sticky left-0 z-10" style={{width:120}}>E.NOC</td>
                <td className="bg-indigo-700 text-white px-3 py-3 font-bold sticky z-10" style={{width:200, left:120}}>E.NOC (점유기간 기준, 원/평/월)</td>
                {cols.map((c,i) => (
                  <td key={i} className="bg-indigo-600 text-white px-3 py-3 font-bold text-right border-l border-indigo-500" style={{fontSize:13}}>

                  </td>
                ))}

            </tbody>
            <tfoot>
              <tr>
                <td colSpan={2 + cols.length} className="bg-amber-50 border-t border-amber-200 px-4 py-2 text-[11px] text-amber-800">
                  ✏️ 노란색 셀은 직접 수정 가능 — 임대조건 입력 시 E.NOC 자동 재계산 / 🔵 회색 셀은 자동계산
                </td>
              </tr>
            </tfoot>

        </div>
      </div>

      <div className="bg-white px-5 py-2.5 border-t border-slate-200 flex items-center justify-between flex-shrink-0">
        <div className="text-[11px] text-slate-500">

        </div>
        <div className="flex items-center gap-2">
          <button onClick={onClose} className="px-3 py-1.5 text-[11px] font-semibold border border-slate-200 rounded-md text-slate-700 hover:bg-slate-50">닫기</button>
          <button onClick={downloadExcel} className="px-3 py-1.5 text-[11px] font-bold bg-green-600 text-white rounded-md hover:bg-green-700">엑셀로 저장</button>
        </div>
      </div>
    </div>
  );
}

function CompareSection({ title, rows, highlight, calc }) {
  return (
    <React.Fragment>
      {rows.map((row, ri) => (
        <tr key={ri} className={calc ? 'bg-slate-50' : ''}>
          {ri === 0 && (
            <td rowSpan={rows.length} className={`px-3 py-2 font-bold sticky left-0 z-10 align-top border-t border-slate-200 ${highlight ? 'bg-amber-50 text-amber-900' : calc ? 'bg-slate-100 text-slate-700' : 'bg-slate-50 text-slate-700'}`} style={{width:120}}>
              {title}
            </td>
          )}
          <td className="px-3 py-1.5 text-slate-600 border-t border-slate-100 sticky z-10 bg-white" style={{width:200, left:120}}>{row[0]}</td>
          {row[1].map((cell, ci) => (
            <td key={ci} className={`px-3 py-1.5 border-t border-slate-100 border-l border-slate-100 text-right tabular-nums ${calc ? 'bg-slate-50 text-slate-600' : 'text-slate-800'}`}>
              {cell}
            </td>
          ))}
        </tr>
      ))}
    </React.Fragment>
  );
}

function EditCell({ value, onChange, type='text' }) {
  return (
    <input type={type} value={value} onChange={e => onChange(e.target.value)}
      className="w-full px-1.5 py-0.5 bg-amber-50 border border-amber-200 rounded text-right tabular-nums focus:border-amber-500 outline-none" />
  );
}

/* ============================================================
 * BuildingDetailPage - 빌딩 상세 페이지 (사진 + 정보 + 메모 + 공실)
 * ============================================================ */
function BuildingDetailPage({ building, onBack, onAddVacancy, onAddAllVacancies, cart }) {
  if (!building) return null;
  const color = REGION_COLORS[building.region];
  const [memoInput, setMemoInput] = useState('');
  const [localMemos, setLocalMemos] = useState(building.memos || []);
  const [memoPage, setMemoPage] = useState(1);
  const MEMO_PER_PAGE = 5;

  useEffect(() => {
    setLocalMemos(building.memos || []);
    setMemoPage(1);
    setMemoInput('');
  }, [building.id]);

  const addMemo = () => {
    if (!memoInput.trim()) return;
    const now = new Date();
    const dt = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
    setLocalMemos(prev => [{ author: '장한덕 본부장', dt, text: memoInput }, ...prev]);
    setMemoInput('');
  };

  const totalMemoPages = Math.max(1, Math.ceil(localMemos.length / MEMO_PER_PAGE));
  const pagedMemos = localMemos.slice((memoPage-1)*MEMO_PER_PAGE, memoPage*MEMO_PER_PAGE);

  return (
    <div className="flex-1 overflow-auto bg-slate-100">
      {/* Top action bar */}
      <div className="bg-white border-b border-slate-200 px-5 py-2.5 flex items-center justify-between flex-shrink-0 sticky top-0 z-10">
        <div className="flex items-center gap-3">
          <button onClick={onBack}
            className="flex items-center gap-1 px-2 py-1 rounded hover:bg-slate-100 text-slate-600 hover:text-indigo-600 text-[12px] font-semibold transition">
            <ChevronLeft size={14} /> 지도로 돌아가기
          </button>
          <div className="h-4 w-px bg-slate-200" />
          <span className="px-2 py-0.5 text-[10px] font-bold rounded" style={{backgroundColor: color.light, color: color.text}}>{color.name}</span>
          <h1 className="font-bold text-[16px] text-slate-900">{building.name}</h1>
          {building.alias && <span className="text-[11px] text-slate-400">{building.alias}</span>}
          {building.exclusive && <span className="px-1.5 py-0.5 text-[10px] font-bold bg-indigo-100 text-indigo-700 rounded">전속</span>}
        </div>
        <div className="flex items-center gap-2">
          <button className="px-3 py-1.5 text-[11px] font-semibold border border-slate-200 rounded text-slate-700 hover:bg-slate-50">제안서 출력</button>
          <button className="px-3 py-1.5 text-[11px] font-bold text-white rounded" style={{backgroundColor: color.bg}}>저장</button>
        </div>
      </div>

      <div className="p-5 space-y-4">
        {/* Top 3-column section */}
        <div className="grid gap-4" style={{gridTemplateColumns: '380px minmax(420px,1fr) 420px'}}>
          {/* LEFT: photo + basic info */}
          <div className="bg-white rounded-lg border border-slate-200 overflow-hidden">
            <BuildingPhoto building={building} />
            <BasicInfoForm building={building} />
          </div>

          {/* MIDDLE: 임대안내문 + 컨택포인트 */}
          <div className="space-y-4">
            <RentalInfoSection building={building} />
            <ContactsSection building={building} />
          </div>

          {/* RIGHT: 메모 내역 */}
          <div className="bg-white rounded-lg border border-slate-200 overflow-hidden flex flex-col" style={{minHeight: 540}}>
            <div className="px-4 py-2.5 border-b border-slate-200 flex items-center justify-between">
              <span className="text-[13px] font-bold text-slate-800">메모 내역</span>
              <span className="text-[10px] text-slate-400 font-semibold">{localMemos.length}건</span>
            </div>
            <div className="p-3 border-b border-slate-100 flex gap-2">
              <textarea value={memoInput} onChange={e => setMemoInput(e.target.value)}
                placeholder="내용을 입력해 주세요."
                className="flex-1 px-2.5 py-2 text-[12px] border border-slate-200 rounded resize-none focus:border-indigo-400 outline-none"
                rows={2}/>
              <button onClick={addMemo}
                className="px-3 py-1.5 text-[11px] font-bold bg-slate-800 text-white rounded hover:bg-slate-900 self-stretch">
                메모<br/>등록
              </button>
            </div>
            <div className="flex-1 overflow-y-auto">
              {localMemos.length === 0 ? (
                <div className="text-center text-[12px] text-slate-400 py-10">메모가 없습니다</div>
              ) : (
                pagedMemos.map((m, i) => (
                  <div key={i} className="px-3 py-2 border-b border-slate-100 hover:bg-slate-50">
                    <div className="flex items-baseline gap-2 mb-1">
                      <span className="text-[11px] font-bold text-indigo-700">{m.author}</span>
                      <span className="text-[10px] text-slate-400">{m.dt}</span>
                    </div>
                    <div className="text-[12px] text-slate-700 leading-relaxed whitespace-pre-line">{m.text}</div>
                  </div>
                ))
              )}
            </div>
            <div className="px-3 py-2 border-t border-slate-200 flex items-center justify-center gap-1 text-[11px]">
              <button onClick={() => setMemoPage(1)} disabled={memoPage === 1}
                className="px-1.5 py-0.5 disabled:text-slate-300 hover:text-indigo-600">{'<<'}</button>
              <button onClick={() => setMemoPage(p => Math.max(1, p-1))} disabled={memoPage === 1}
                className="px-1.5 py-0.5 disabled:text-slate-300 hover:text-indigo-600">{'<'}</button>
              {Array.from({length: Math.min(5, totalMemoPages)}).map((_, i) => {
                const pg = i + 1;
                return (
                  <button key={pg} onClick={() => setMemoPage(pg)}
                    className={`px-2 py-0.5 rounded ${memoPage===pg ? 'bg-slate-800 text-white font-bold' : 'text-slate-600 hover:bg-slate-100'}`}>{pg}</button>
                );
              })}
              <button onClick={() => setMemoPage(p => Math.min(totalMemoPages, p+1))} disabled={memoPage === totalMemoPages}
                className="px-1.5 py-0.5 disabled:text-slate-300 hover:text-indigo-600">{'>'}</button>
              <button onClick={() => setMemoPage(totalMemoPages)} disabled={memoPage === totalMemoPages}
                className="px-1.5 py-0.5 disabled:text-slate-300 hover:text-indigo-600">{'>>'}</button>
            </div>
          </div>
        </div>

        {/* 기준층 정보 (평단가) */}
        <BaseStandardTable building={building} />

        {/* 개별공실 정보 */}
        <VacancyDetailTable building={building} onAddVacancy={onAddVacancy} onAddAllVacancies={onAddAllVacancies} cart={cart} />
      </div>
    </div>
  );
}

/* ----- 빌딩 사진 ----- */

  return (
    <div className="relative aspect-[16/10] bg-gradient-to-br from-slate-100 to-slate-200 flex items-center justify-center border-b border-slate-200">
      {hasPhoto ? (
        <img src={building.photo} alt={building.name}
          className="w-full h-full object-cover"
          onError={() => setImgError(true)} />
      ) : (
        <div className="flex flex-col items-center gap-1.5 text-slate-400">
          <ImageIcon size={30} />
          <span className="text-[10px] font-semibold">이미지를 업로드해주세요</span>

      )}
      <button className="absolute top-2 right-2 p-1 bg-white/90 backdrop-blur rounded hover:bg-white">

}

      <div className="col-span-3 bg-slate-50 px-2.5 py-2 font-semibold text-slate-600 border-r border-slate-100 flex items-center">{label}</div>
      <div className="col-span-9 px-2.5 py-2 text-slate-800">{value}</div>
    </div>
  );
  return (

/* ============================================================
 * AllBuildingsPage - 전체 빌딩 리스트 페이지
 * ============================================================ */
function AllBuildingsPage({ buildings, filters, onOpenDetail, onAddVacancy, cart }) {
  const [activeTab, setActiveTab] = useState('rental');  // 'rental' | 'mine'
  const [sort, setSort] = useState('area');              // area | vacancy | base | noc | name
  const [starred, setStarred] = useState(new Set());

  const toggleStar = (id) => {
    setStarred(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  };

  const sumVacArea = (b) => b.vacancies.reduce((s, v) => s + (v.area || 0), 0);

  const sorted = useMemo(() => {
    const arr = [...buildings];
    arr.sort((a, b) => {
      switch (sort) {
        case 'vacancy': return sumVacArea(b) - sumVacArea(a);
        case 'base':    return (b.baseLease || 0) - (a.baseLease || 0);
        case 'noc':     return (b.noc || 0) - (a.noc || 0);
        case 'name':    return a.name.localeCompare(b.name, 'ko');
        case 'area':
        default:        return (b.area || 0) - (a.area || 0);
      }
    });
    return arr;
  }, [buildings, sort]);

  // 카트에 매물 들어있는 빌딩만 보기 (내 물건 탭)
  const cartBuildingIds = new Set(cart.map(c => c.buildingId));
  const filtered = activeTab === 'mine'
    ? sorted.filter(b => cartBuildingIds.has(b.id))
    : sorted;

  const isInCartAny = (b) => b.vacancies.some(v => cart.some(item => item.id === `${b.id}-${v.floor}`));

  return (
    <div className="flex-1 flex flex-col overflow-hidden bg-slate-50">
      {/* 탭 */}
      <div className="bg-white border-b border-slate-200 flex items-center justify-between flex-shrink-0">
        <div className="flex">
          <button onClick={() => setActiveTab('rental')}
            className={`px-5 py-2.5 text-[12px] font-semibold border-b-2 ${activeTab === 'rental' ? 'text-rose-600 border-rose-600' : 'text-slate-500 border-transparent hover:text-slate-700'}`}>
            임대 안내문
          </button>
          <button onClick={() => setActiveTab('mine')}
            className={`px-5 py-2.5 text-[12px] font-semibold border-b-2 ${activeTab === 'mine' ? 'text-rose-600 border-rose-600' : 'text-slate-500 border-transparent hover:text-slate-700'}`}>
            내 물건 {cartBuildingIds.size > 0 && <span className="ml-1 px-1.5 py-px text-[9px] bg-indigo-100 text-indigo-700 rounded-full">{cartBuildingIds.size}</span>}
          </button>
        </div>
        <div className="flex items-center gap-2 pr-4 text-[11px] text-slate-500">
          <UserCheck size={12} />
          김연중 이사 (LM본부) 님
        </div>
      </div>

      {/* 헤더 (총 N개, 정렬, 신규 등록) */}
      <div className="bg-white border-b border-slate-200 px-4 py-2.5 flex items-center justify-between flex-shrink-0">
        <div className="text-[12px] font-semibold text-slate-700">
          총 <span className="text-rose-600 font-bold">{filtered.length}</span> 개
        </div>
        <div className="flex items-center gap-2">
          <select value={sort} onChange={e => setSort(e.target.value)}
            className="px-2.5 py-1.5 text-[11px] border border-slate-200 rounded font-semibold text-slate-700 bg-white outline-none focus:border-indigo-400">
            <option value="area">연면적 순</option>
            <option value="vacancy">총 공실면적 순</option>
            <option value="base">기준층 면적 순</option>
            <option value="noc">기준층 NOC 순</option>
            <option value="name">빌딩명 (가나다)</option>
          </select>
          <button className="px-3 py-1.5 text-[11px] font-bold bg-slate-800 text-white rounded hover:bg-slate-900">신규 등록</button>
        </div>
      </div>

      {/* 테이블 */}
      <div className="flex-1 overflow-auto">
        <table className="w-full text-[11px] tabular-nums bg-white">
          <thead className="bg-slate-50 sticky top-0 z-10">
            <tr className="text-slate-500 font-semibold border-b border-slate-200">
              <th className="px-3 py-2 text-center w-8"></th>
              <th className="px-3 py-2 text-left">빌딩명</th>
              <th className="px-3 py-2 text-left">주소</th>
              <th className="px-3 py-2 text-right">연면적</th>
              <th className="px-3 py-2 text-right">총 공실면적</th>
              <th className="px-3 py-2 text-right">기준층 면적</th>
              <th className="px-3 py-2 text-right">기준층 NOC</th>
              <th className="px-3 py-2 text-center w-20">상세</th>
              <th className="px-3 py-2 text-center w-20">비교리스트</th>
            </tr>
          </thead>
          <tbody>
            {filtered.length === 0 ? (
              <tr><td colSpan="9" className="text-center text-slate-400 py-12 text-[12px]">조건에 맞는 빌딩이 없습니다</td></tr>
            ) : (
              filtered.map(b => {
                const vacSum = sumVacArea(b);
                const isStar = starred.has(b.id);
                const inCart = isInCartAny(b);
                const color = REGION_COLORS[b.region];
                return (
                  <tr key={b.id} className="border-b border-slate-100 hover:bg-slate-50 transition">
                    <td className="px-3 py-2 text-center">
                      <button onClick={() => toggleStar(b.id)}
                        className={isStar ? 'text-amber-400' : 'text-slate-300 hover:text-amber-400'}>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill={isStar ? 'currentColor' : 'none'} stroke="currentColor" strokeWidth="2">
                          <polygon points="12 2 15 8.5 22 9.3 17 14 18.2 21 12 17.8 5.8 21 7 14 2 9.3 9 8.5 12 2"/>
                        </svg>
                      </button>
                    </td>
                    <td className="px-3 py-2">
                      <div className="flex items-center gap-1.5">
                        <span className="w-1.5 h-1.5 rounded-full" style={{backgroundColor: color.bg}} title={color.name} />
                        <span className="font-bold text-slate-800">{b.name}</span>
                        {b.exclusive && <span className="px-1 py-px text-[9px] font-bold bg-indigo-100 text-indigo-700 rounded">전속</span>}
                      </div>
                    </td>
                    <td className="px-3 py-2 text-slate-600 truncate" title={b.address}>{b.address}</td>
                    <td className="px-3 py-2 text-right text-slate-700">{b.area ? b.area.toLocaleString() + ' 평' : '-'}</td>
                    <td className="px-3 py-2 text-right text-slate-700">{vacSum > 0 ? vacSum.toFixed(0) + ' 평' : '-'}</td>
                    <td className="px-3 py-2 text-right text-slate-700">{b.baseLease ? b.baseLease + ' 평' : '-'}</td>
                    <td className="px-3 py-2 text-right text-slate-700">{b.noc ? b.noc.toLocaleString() + ' 원' : '-'}</td>
                    <td className="px-3 py-2 text-center">
                      <button onClick={() => onOpenDetail(b.id)}
                        className="px-3 py-1 text-[10px] font-semibold border border-slate-200 rounded text-slate-700 hover:bg-slate-100 hover:border-slate-300">
                        상세 보기
                      </button>
                    </td>
                    <td className="px-3 py-2 text-center">
                      <button onClick={() => b.vacancies.forEach(v => onAddVacancy(b, v))}
                        disabled={b.vacancies.length === 0}
                        className={`px-3 py-1 text-[10px] font-semibold border rounded ${
                          b.vacancies.length === 0 ? 'border-slate-100 text-slate-300 cursor-not-allowed' :
                          inCart ? 'border-indigo-200 text-indigo-600 bg-indigo-50' :
                          'border-slate-200 text-slate-700 hover:bg-slate-100 hover:border-slate-300'
                        }`}>
                        {inCart ? '담김' : '담기'}
                      </button>
                    </td>
                  </tr>
                );
              })
            )}
          </tbody>
        </table>
      </div>
    </div>
  );
}
