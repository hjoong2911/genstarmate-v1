function HomeDashboard({ onNavigate }) {
  const chartRef = React.useRef(null);
  const chartInstanceRef = React.useRef(null);

  // 데이터 집계 (실제 COMPANIES / DEALS / CONTRACTS 사용)
  const gradeCount = useMemo(() => {
    const g = { A:0, B:0, C:0, D:0, E:0, F:0 };
    COMPANIES.forEach(c => { if (g[c.g] !== undefined) g[c.g]++; });
    return g;
  }, []);

  const dealStats = useMemo(() => {
    const byStatus = {};
    DEALS.forEach(d => { byStatus[d.st] = (byStatus[d.st] || 0) + 1; });
    const inProgress = DEALS.filter(d => d.st !== '완료' && d.st !== '무산');
    return { byStatus, total: inProgress.length };
  }, []);

  const contractStats = useMemo(() => {
    const now = new Date('2025-02-15');
    const thisMonth = CONTRACTS.filter(c => {
      const [y, m] = c.gen.split('.').map(Number);
      return y === now.getFullYear() && m === now.getMonth() + 1;
    });
    const totalArea = CONTRACTS.reduce((s, c) => s + parseInt(c.area.replace(/[^0-9]/g, '') || 0), 0);
    const totalCount = CONTRACTS.length;
    // 수수료 = 보증금의 1% 가정 / 또는 임대료 1개월
    const totalFee = CONTRACTS.reduce((s, c) => s + (c.rentNum || 0), 0);
    const newCount = CONTRACTS.filter(c => c.type === '신규').length;
    const renewCount = CONTRACTS.filter(c => c.type === '갱신').length;
    return { thisMonth, totalArea, totalCount, totalFee, newCount, renewCount };
  }, []);

  // Chart.js 로드 + 그리기
  useEffect(() => {
    let cancelled = false;
    const loadChart = () => {
      if (window.Chart) {
        drawChart();
        return;
      }
      const script = document.createElement('script');
      script.src = 'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js';
      script.onload = () => { if (!cancelled) drawChart(); };
      document.head.appendChild(script);
    };

    const drawChart = () => {
      if (!chartRef.current || !window.Chart) return;
      if (chartInstanceRef.current) chartInstanceRef.current.destroy();
      chartInstanceRef.current = new window.Chart(chartRef.current, {
        type: 'bar',
        data: {
          labels: ['A등급','B등급','C등급','D등급','E등급','F등급'],
          datasets: [{
            data: [gradeCount.A, gradeCount.B, gradeCount.C, gradeCount.D, gradeCount.E, gradeCount.F],
            backgroundColor: ['#4F46E5','#10B981','#F59E0B','#EF4444','#64748B','#1F2937'],
            borderRadius: 6,
            borderSkipped: false,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ' ' + ctx.raw + '개' } } },
          scales: {
            x: { grid: { display: false }, ticks: { color: 'rgba(0,0,0,0.5)', font: { size: 11 } } },
            y: { beginAtZero: true, ticks: { color: 'rgba(0,0,0,0.5)', font: { size: 11 }, stepSize: 1 }, grid: { color: 'rgba(0,0,0,0.06)' } },
          },
        },
      });
    };

    loadChart();
    return () => {
      cancelled = true;
      if (chartInstanceRef.current) { chartInstanceRef.current.destroy(); chartInstanceRef.current = null; }
    };
  }, [gradeCount]);

  const dealStatusColors = {
    '검토중':   ['#EEEDFE','#534AB7','#4F46E5'],
    '협의중':   ['#E6F1FB','#042C53','#185FA5'],
    '제안완료': ['#FAEEDA','#633806','#BA7517'],
    '계약진행': ['#E1F5EE','#085041','#0F6E56'],
  };
  const maxDealCount = Math.max(...Object.values(dealStats.byStatus), 1);

  return (
    <div className="flex-1 overflow-auto bg-slate-100 p-5">
      {/* 헤더 */}
      <div className="flex items-center justify-between pb-3.5 mb-4 border-b border-slate-200">
        <div>
          <h1 className="text-[18px] font-semibold text-slate-900">홈 대시보드</h1>
          <div className="text-[11px] text-slate-500 mt-1">{new Date().toLocaleDateString('ko-KR', {year:'numeric',month:'long',day:'numeric'})} · LM본부 관리자 장한덕</div>
        </div>
        <span className="text-[11px] bg-white border border-slate-200 px-3 py-1.5 rounded-md text-slate-600">📅 2025년 기준</span>
      </div>

      {/* Row 1: 거래처 등급 차트 + 진행중 딜 + 이번달 계약 */}
      <div className="grid gap-3.5 mb-3.5" style={{gridTemplateColumns: '1fr 200px 220px'}}>
        {/* 거래처 등급별 */}
        <div onClick={() => onNavigate('companiesAll')} className="bg-white rounded-xl border border-slate-200 p-4 cursor-pointer hover:border-indigo-300 hover:shadow-sm transition">
          <div className="text-[12px] font-medium text-slate-500 mb-2.5 flex items-center gap-1.5">
            <Briefcase size={13} strokeWidth={1.75} className="text-indigo-600"/>
            전체 거래처 등급별 수량
          </div>
          <div className="flex gap-2.5 flex-wrap mb-3 text-[11px] text-slate-600">
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-sm bg-indigo-600"/>A {gradeCount.A}개</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-sm bg-emerald-600"/>B {gradeCount.B}개</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-sm bg-amber-600"/>C {gradeCount.C}개</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-sm bg-rose-600"/>D {gradeCount.D}개</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-sm bg-slate-500"/>E {gradeCount.E}개</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-sm bg-slate-800"/>F {gradeCount.F}개</span>
          </div>
          <div style={{position: 'relative', height: 165}}>
            <canvas ref={chartRef}></canvas>
          </div>
        </div>

        {/* 진행중 딜 */}
        <div onClick={() => onNavigate('dealsAll')} className="bg-white rounded-xl border border-slate-200 p-4 cursor-pointer hover:border-amber-300 hover:shadow-sm transition">
          <div className="text-[12px] font-medium text-slate-500 mb-2.5 flex items-center gap-1.5">
            <Sparkles size={13} strokeWidth={1.75} className="text-amber-700"/>
            진행중인 딜
          </div>
          <div className="text-[36px] font-medium leading-none mb-1 text-amber-700">{dealStats.total}</div>
          <div className="text-[11px] text-slate-500 mb-3">건 진행중</div>
          <div className="border-t border-slate-100 pt-2.5 space-y-1.5">
            {Object.entries(dealStats.byStatus).filter(([k]) => k !== '완료' && k !== '무산').map(([k, v]) => {
              const [bg, c] = dealStatusColors[k] || ['#f2f2f0','#888'];
              return (
                <div key={k} className="flex justify-between items-center">
                  <span className="text-[11px] text-slate-600">{k}</span>
                  <span style={{background: bg, color: c}} className="text-[11px] font-medium px-2 py-0.5 rounded">{v}</span>
                </div>
              );
            })}
          </div>
        </div>

        {/* 이번달 계약 완료 */}
        <div onClick={() => onNavigate('contractsAll')} className="bg-white rounded-xl border border-slate-200 p-4 cursor-pointer hover:border-emerald-300 hover:shadow-sm transition">
          <div className="text-[12px] font-medium text-slate-500 mb-2.5 flex items-center gap-1.5">
            <FileText size={13} strokeWidth={1.75} className="text-emerald-700"/>
            이번달 계약 완료
          </div>
          <div className="text-[36px] font-medium leading-none mb-1 text-emerald-700">{contractStats.thisMonth.length}</div>
          <div className="text-[11px] text-slate-500 mb-3">건 완료</div>
          <div className="border-t border-slate-100 pt-2.5 space-y-2">
            {contractStats.thisMonth.length === 0 ? (
              <div className="text-[11px] text-slate-400">이번달 완료 계약 없음</div>
            ) : contractStats.thisMonth.map((c, i) => (
              <div key={i} className="flex items-start gap-2">
                <div className="w-1.5 h-1.5 rounded-full bg-emerald-600 mt-1.5"/>
                <div>
                  <div className="text-[11px] font-medium text-slate-800">{c.co}</div>
                  <div className="text-[10px] text-slate-500">{c.area}평 · {c.region}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Row 2: 딜 상태별 현황 */}
      <div onClick={() => onNavigate('dealsAll')} className="bg-white rounded-xl border border-slate-200 p-4 mb-3.5 cursor-pointer hover:border-indigo-300 hover:shadow-sm transition">
        <div className="text-[12px] font-medium text-slate-500 mb-3 flex items-center gap-1.5">
          📊 딜 상태별 현황
        </div>
        <div className="space-y-2.5">
          {Object.keys(dealStatusColors).map(st => {
            const cnt = dealStats.byStatus[st] || 0;
            const pct = (cnt / maxDealCount) * 100;
            const [bg, c, fill] = dealStatusColors[st];
            return (
              <div key={st} className="flex items-center gap-3">
                <div className="w-16 flex-shrink-0 text-right">
                  <span style={{background: bg, color: c}} className="text-[11px] font-medium px-2 py-0.5 rounded">{st}</span>
                </div>
                <div className="flex-1 h-8 bg-slate-100 rounded-md overflow-hidden">
                  <div style={{width: pct + '%', background: fill}} className="h-full rounded-md flex items-center justify-end pr-3">
                    <span className="text-[11px] font-medium text-white">{cnt}건</span>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
        <div className="flex justify-end mt-3 pt-2.5 border-t border-slate-100 text-[11px] text-slate-500">
          전체 <strong className="text-slate-800 mx-1">{dealStats.total}건</strong> 진행중
        </div>
      </div>

      {/* Row 3: 올해 총 계약 실적 */}
      <div className="bg-slate-50 rounded-xl border border-slate-200 p-5">
        <div className="text-[12px] font-medium text-slate-500 mb-3.5 flex items-center gap-1.5">
          📅 올해 총 계약 실적 <span className="text-[11px] font-normal text-slate-400 ml-1">(2025년 누계)</span>
        </div>
        <div className="grid grid-cols-3 gap-3">
          <div className="bg-white rounded-lg p-4 border border-slate-100">
            <div className="text-[12px] text-slate-500 mb-1.5">총 계약 면적</div>
            <div className="text-[28px] font-medium leading-none text-indigo-600">{contractStats.totalArea.toLocaleString()}</div>
            <div className="text-[12px] text-slate-500 mt-1">평</div>
            <div className="mt-2.5 text-[11px] text-slate-500">월평균 <strong className="text-indigo-600">{Math.round(contractStats.totalArea / 6).toLocaleString()} 평</strong></div>
          </div>
          <div className="bg-white rounded-lg p-4 border border-slate-100">
            <div className="text-[12px] text-slate-500 mb-1.5">총 계약 건수</div>
            <div className="text-[28px] font-medium leading-none text-emerald-600">{contractStats.totalCount}</div>
            <div className="text-[12px] text-slate-500 mt-1">건</div>
            <div className="mt-2.5 text-[11px] text-slate-500">신규 <strong className="text-emerald-600">{contractStats.newCount}건</strong> · 갱신 <strong className="text-emerald-600">{contractStats.renewCount}건</strong></div>
          </div>
          <div className="bg-white rounded-lg p-4 border border-slate-100">
            <div className="text-[12px] text-slate-500 mb-1.5">월 임대료 총액</div>
            <div className="text-[28px] font-medium leading-none text-amber-700">{(contractStats.totalFee/10000).toFixed(2)}억</div>
            <div className="text-[12px] text-slate-500 mt-1">만원/월</div>
            <div className="mt-2.5 text-[11px] text-slate-500">건당 평균 <strong className="text-amber-700">{Math.round(contractStats.totalFee / contractStats.totalCount).toLocaleString()}만원/월</strong></div>
          </div>
        </div>
      </div>
    </div>
  );
}

function WipPage({ label }) {
  return (
    <div className="flex-1 flex flex-col items-center justify-center bg-slate-50 text-slate-400">
      <Sparkles size={48} className="opacity-20 mb-4" />
      <div className="text-[15px] font-bold text-slate-600">{label}</div>
      <div className="text-[12px] mt-1">곧 제공될 예정입니다</div>
    </div>
  );
}

function Section({ title, tone = 'slate', subtitle, children }) {
  const toneClass = {
    indigo: 'bg-indigo-50 text-indigo-900',
    emerald: 'bg-emerald-50 text-emerald-900',
    amber: 'bg-amber-50 text-amber-900',
    sky: 'bg-sky-50 text-sky-900',
    slate: 'bg-slate-100 text-slate-800',
  }[tone];
  return (
    <div>
      <div className={`px-3 py-2 rounded-t-lg flex items-center gap-2 text-[12px] font-bold ${toneClass}`}>
        {title}
        {subtitle && <span className="text-[10px] font-normal opacity-70">— {subtitle}</span>}
      </div>
      <div className="bg-white border border-slate-200 border-t-0 rounded-b-lg overflow-hidden">
        {children}
      </div>
    </div>
  );
}

console.log("ABOUT TO RENDER REACT APP - root element:", document.getElementById('root'));
ReactDOM.createRoot(document.getElementById('root')).render(<GenstarMate />);
console.log("REACT APP RENDER CALLED");
})();
</script>
</body>
</html>
