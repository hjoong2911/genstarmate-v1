/* ===== Icon components (inline SVG, lucide-style) ===== */

const MapPin        = (p) => <Svg {...p}><path d="M20 10c0 7-8 13-8 13s-8-6-8-13a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></Svg>;

const Sparkles      = (p) => <Svg {...p}><path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3L12 3Z"/></Svg>;

/* ===== Data ===== */

const BUILDINGS = [

  { id: 6, name: '씨드큐브창동',       region: 'OUT',    address: '서울 도봉구 마들로11길 64',      floors: 'B3/18F', built: '2019/-',    area: 12100, occupancy: 49, baseLease: 220, baseNet: 145, exclusive: false, parking: '혼용',   x: 60, y: 22,
    vacancies: [{ floor: '10층', area: 200, net: 140, noc: 16, when: '5월 입주' }], totalVacantArea: 200, totalVacantNet: 140 },
  { id: 7, name: '과천스마트케이A',    region: 'OUT',    address: '경기 과천시 과천대로 7길 33',     floors: 'B4/20F', built: '2018/-',    area: 16800, occupancy: 53, baseLease: 260, baseNet: 170, exclusive: false, parking: '자주식', x: 52, y: 78,
    vacancies: [{ floor: '7층',  area: 230, net: 155, noc: 19, when: '즉시' }], totalVacantArea: 230, totalVacantNet: 155 },
  { id: 8, name: '분당스퀘어',         region: 'BBD',    address: '경기 성남시 분당구 판교역로 152', floors: 'B5/25F', built: '2010/2019', area: 22300, occupancy: 56, baseLease: 295, baseNet: 200, exclusive: false, parking: '자주식', x: 66, y: 84,
    vacancies: [{ floor: '9층',  area: 270, net: 185, noc: 22, when: '6월 입주' }], totalVacantArea: 270, totalVacantNet: 185 },
  { id: 9, name: '광화문D타워',        region: 'CBD',    address: '서울 종로구 종로 1',             floors: 'B7/28F', built: '2012/2021', area: 28500, occupancy: 54, baseLease: 330, baseNet: 220, exclusive: true,  parking: '자주식', x: 53, y: 44,
    vacancies: [{ floor: '14층', area: 310, net: 220, noc: 28, when: '즉시' }], totalVacantArea: 310, totalVacantNet: 220 },
  { id: 10, name: '강남파이낸스센터',  region: 'GBD',    address: '서울 강남구 테헤란로 152',       floors: 'B8/45F', built: '2002/2017', area: 35200, occupancy: 58, baseLease: 360, baseNet: 245, exclusive: true,  parking: '자주식', x: 67, y: 65,
    vacancies: [{ floor: '22층', area: 380, net: 260, noc: 30, when: '즉시' }], totalVacantArea: 380, totalVacantNet: 260 },
];

const NAV_SECTIONS = [
  { group: '메인',              items: [{ icon: Home,       label: '홈 대시보드' }] },
  { group: '빌딩',              items: [{ icon: Building2,  label: '빌딩',    children: ['지도 기반 페이지', '빌딩 페이지', '빌딩 등록 페이지'], active: true, activeChild: '지도 기반 페이지' }] },
  { group: '거래처 (관리 기업)', items: [{ icon: Briefcase,  label: '거래처',  children: ['전체 거래처 페이지', '거래처 등록 페이지'] }] },
  { group: '고객 (담당자)',      items: [{ icon: Users,      label: '고객',    children: ['전체 고객 페이지', '고객 등록 페이지'] }] },
  { group: '리드',              items: [{ icon: UserCheck,  label: '리드',    children: ['리드 페이지', '리드 등록 페이지', '내 리드 페이지'] }] },
  { group: '계약 관리',         items: [{ icon: FileText,   label: '계약',    children: ['계약 페이지', '계약 등록 페이지'] }] },
];

const FILTER_DEFS = [
  { key: 'totalArea',     label: '총 임차 가능면적',          unit: '평',    type: 'range' },
  { key: 'baseFloorArea', label: '건축물대장 기준층 면적',   unit: '평',    type: 'range' },
  { key: 'netArea',       label: '전용 면적',                  unit: '평',    type: 'range' },
  { key: 'monthlyFee',    label: '월 고정비',                  unit: '원/평', type: 'range' },
  { key: 'deposit',       label: '보증금',                     unit: '원/평', type: 'range' },
  { key: 'noc',           label: 'NOC',                        unit: '',      type: 'range' },
  { key: 'exclusive',     label: '전속',                       type: 'yn' },
  { key: 'floors',        label: '층수',                       type: 'multi', options: ['1층', '지하층', '지상층(1층 제외)'] },
  { key: 'vacancy',       label: '공실',                       type: 'yn' },
  { key: 'parking',       label: '주차',                       type: 'multi', options: ['자주식', '기계식', '혼용'] },
];

const INITIAL_FILTERS = FILTER_DEFS.reduce((acc, def) => {
  acc[def.key] = def.type === 'range' ? { min: '', max: '' } : (def.type === 'multi' ? [] : null);
  return acc;
}, {});

/* ===== Main ===== */
function GenstarMate() {
  const [selectedId, setSelectedId]       = useState(1);
  const [sidebarOpen, setSidebarOpen]     = useState(true);
  const [filters, setFilters]             = useState(INITIAL_FILTERS);
  const [openFilterKey, setOpenFilterKey] = useState(null);
  const [activeRegions, setActiveRegions] = useState(['CBD', 'GBD', 'YBD', 'BBD', 'OTHERS', 'OUT']);
  const [photoIdx, setPhotoIdx]           = useState(0);

  const resetFilters = () => {
    setFilters(INITIAL_FILTERS);
    setActiveRegions(['CBD', 'GBD', 'YBD', 'BBD', 'OTHERS', 'OUT']);
    setOpenFilterKey(null);
  };

  const visibleBuildings = useMemo(
    () => BUILDINGS.filter(b => activeRegions.includes(b.region)),
    [activeRegions]
  );

  const selected = BUILDINGS.find(b => b.id === selectedId) || BUILDINGS[0];

  const hasFilterValue = (key) => {
    const v = filters[key];
    if (!v) return false;
    if (Array.isArray(v)) return v.length > 0;
    if (typeof v === 'object') return v.min || v.max;
    return true;
  };

  return (
    <div className="h-screen flex bg-slate-50 text-slate-800 overflow-hidden text-[13px]">
      <Sidebar open={sidebarOpen} onToggle={() => setSidebarOpen(!sidebarOpen)} />
      <div className="flex-1 flex flex-col min-w-0">
        <FilterBar filters={filters} setFilters={setFilters}
          openFilterKey={openFilterKey} setOpenFilterKey={setOpenFilterKey}
          hasFilterValue={hasFilterValue}
          activeRegions={activeRegions} setActiveRegions={setActiveRegions}
          resetFilters={resetFilters} />
        <main className="flex-1 flex overflow-hidden min-h-0">
          <div className="flex-1 relative bg-slate-100 min-w-0">
            <StylizedMap buildings={visibleBuildings} selectedId={selectedId}
              onMarkerClick={(id) => { setSelectedId(id); setPhotoIdx(0); }} />
            <MapLegend />
            <MapStats count={visibleBuildings.length} regionCount={activeRegions.length} />
          </div>
          <DetailCard building={selected} photoIdx={photoIdx} setPhotoIdx={setPhotoIdx} />
          <CompactList buildings={visibleBuildings} selectedId={selectedId}
            onSelect={(id) => { setSelectedId(id); setPhotoIdx(0); }} />
        </main>
      </div>
    </div>
  );
}

/* ===== Sidebar ===== */
function Sidebar({ open, onToggle }) {
  return (
    <aside className={`bg-gradient-to-b from-slate-900 to-slate-800 text-slate-100 flex flex-col flex-shrink-0 transition-all duration-200 ${open ? 'w-48' : 'w-12'}`}>
      <div className="px-3 py-3 border-b border-slate-700/40 flex items-center justify-between flex-shrink-0">
        {open && (
          <div>
            <div className="text-[14px] font-bold tracking-tight">Genstar<span className="font-light text-indigo-300">Mate</span></div>
            <div className="text-[9px] text-slate-400 mt-0.5">CRM v1.0 · 오피스 임대</div>
          </div>
        )}
        <button onClick={onToggle} className="p-1 rounded hover:bg-slate-700/40 text-slate-400 hover:text-white">
          {open ? <PanelLeftClose size={14} /> : <PanelLeftOpen size={14} />}
        </button>
      </div>
      <nav className="flex-1 overflow-y-auto py-2">
        {NAV_SECTIONS.map(section => (
          <div key={section.group} className="mb-3">
            {open && <div className="px-3 text-[9px] font-semibold text-slate-500 uppercase tracking-wider mb-1">{section.group}</div>}
            {section.items.map(item => {
              const Icon = item.icon;
              return (
                <div key={item.label}>
                  <div className={`flex items-center gap-2 px-3 py-1.5 text-[12px] cursor-pointer transition ${item.active ? 'text-white bg-slate-700/30' : 'text-slate-300 hover:bg-slate-700/30'}`}>
                    <Icon size={13} strokeWidth={1.75} />
                    {open && <span className="font-medium">{item.label}</span>}
                  </div>
                  {open && item.children && (
                    <div className="ml-6 mb-1">
                      {item.children.map(child => (
                        <div key={child} className={`px-3 py-1 text-[11px] cursor-pointer transition ${item.activeChild === child ? 'text-indigo-300 font-semibold border-l-2 border-indigo-400 pl-2.5' : 'text-slate-400 hover:text-slate-200'}`}>
                          {child}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        ))}
      </nav>
      {open && (
        <div className="px-3 py-2 border-t border-slate-700/40 flex items-center gap-2 flex-shrink-0">
          <div className="w-7 h-7 rounded-full bg-gradient-to-br from-indigo-400 to-purple-500 flex items-center justify-center text-[10px] font-bold flex-shrink-0">LM</div>
          <div className="flex-1 min-w-0">
            <div className="text-[11px] font-semibold truncate">장한덕 본부장</div>
            <div className="text-[9px] text-slate-400 truncate">LM본부 · 관리자</div>
          </div>
        </div>
      )}
    </aside>
  );
}

/* ===== FilterBar ===== */
function FilterBar({ filters, setFilters, openFilterKey, setOpenFilterKey, hasFilterValue, activeRegions, setActiveRegions, resetFilters }) {
  const updateRange = (key, field, val) =>
    setFilters({ ...filters, [key]: { ...filters[key], [field]: val } });

  return (
    <header className="bg-white border-b border-slate-200 flex-shrink-0">
      <div className="px-5 py-2.5 flex items-center justify-between">
        <div className="flex items-center gap-3">
          <Sparkles size={14} className="text-indigo-600" />
          <h1 className="font-bold text-[15px] text-slate-900">빌딩 · 지도 기반</h1>
          <span className="text-[11px] text-slate-400">권역별 색상으로 공실 현황 확인</span>
        </div>
        <div className="flex items-center gap-2">
          <div className="flex items-center gap-1 pr-3 border-r border-slate-200">
            <span className="text-[10px] font-semibold text-slate-500 uppercase tracking-wider mr-1">권역</span>
            {Object.entries(REGION_COLORS).map(([key, conf]) => {
              const active = activeRegions.includes(key);
              return (
                <button key={key}
                  onClick={() => setActiveRegions(active ? activeRegions.filter(r => r !== key) : [...activeRegions, key])}
                  className={`px-2 py-0.5 rounded-full text-[10px] font-bold border transition ${active ? 'text-white shadow-sm' : 'bg-white text-slate-400 border-slate-200'}`}
                  style={active ? { backgroundColor: conf.bg, borderColor: conf.bg } : {}}>
                  {conf.name}
                </button>
              );
            })}
          </div>
          <button onClick={resetFilters} className="flex items-center gap-1 text-[11px] text-slate-500 hover:text-indigo-600 px-2 py-1 rounded transition">
            <RotateCcw size={11} /> 초기화
          </button>
          <button className="px-3 py-1.5 text-[11px] font-semibold border border-slate-200 rounded-lg text-slate-700 hover:bg-slate-50 flex items-center gap-1">
            <Plus size={12} /> 빌딩 등록
          </button>
        </div>
      </div>

      <div className="px-5 py-2 flex items-center gap-1.5 border-t border-slate-100 overflow-x-auto">
        <span className="text-[11px] font-bold text-slate-600 mr-1 flex-shrink-0">필터</span>
        {FILTER_DEFS.map(def => {
          const isOpen = openFilterKey === def.key;
          const hasValue = hasFilterValue(def.key);
          return (
            <button key={def.key} onClick={() => setOpenFilterKey(isOpen ? null : def.key)}
              className={`flex items-center gap-1 px-2.5 py-1 text-[11px] font-medium rounded-lg border transition flex-shrink-0
                ${isOpen ? 'bg-indigo-600 text-white border-indigo-600 shadow-sm' :
                  hasValue ? 'bg-indigo-50 text-indigo-700 border-indigo-200' :
                  'bg-white text-slate-600 border-slate-200 hover:border-slate-300'}`}>
              {def.label}
              {def.unit && <span className={isOpen ? 'text-indigo-200' : 'text-slate-400'}>({def.unit})</span>}
              {hasValue && !isOpen && <span className="w-1.5 h-1.5 rounded-full bg-indigo-500" />}
              <ChevronDown size={11} className={`transition ${isOpen ? 'rotate-180' : ''}`} />
            </button>
          );
        })}
      </div>

      {openFilterKey && (() => {
        const def = FILTER_DEFS.find(d => d.key === openFilterKey);
        if (!def) return null;
        const val = filters[def.key];
        return (
          <div className="px-5 py-3 bg-slate-50 border-t border-slate-200 flex items-center gap-3">
            <div className="text-[11px] font-bold text-slate-700 flex-shrink-0 min-w-[140px]">
              {def.label} {def.unit && <span className="text-slate-400 font-normal">({def.unit})</span>}
            </div>
            {def.type === 'range' && (
              <div className="flex items-center gap-2">
                <input type="number" placeholder="최소" value={val.min}
                  onChange={(e) => updateRange(def.key, 'min', e.target.value)}
                  className="w-28 px-2.5 py-1.5 text-[12px] border border-slate-200 rounded-md focus:border-indigo-400 focus:ring-1 focus:ring-indigo-100 outline-none bg-white" />
                <span className="text-slate-400 text-xs">~</span>
                <input type="number" placeholder="최대" value={val.max}
                  onChange={(e) => updateRange(def.key, 'max', e.target.value)}
                  className="w-28 px-2.5 py-1.5 text-[12px] border border-slate-200 rounded-md focus:border-indigo-400 focus:ring-1 focus:ring-indigo-100 outline-none bg-white" />
              </div>
            )}
            {def.type === 'yn' && (
              <div className="flex gap-1.5">
                {['Y', 'N'].map(opt => (
                  <button key={opt}
                    onClick={() => setFilters({ ...filters, [def.key]: val === opt ? null : opt })}
                    className={`px-4 py-1.5 text-[11px] font-bold rounded-md transition ${val === opt ? 'bg-indigo-600 text-white' : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50'}`}>
                    {opt}
                  </button>
                ))}
              </div>
            )}
            {def.type === 'multi' && (
              <div className="flex gap-1.5">
                {def.options.map(opt => {
                  const selected = val.includes(opt);
                  return (
                    <button key={opt}
                      onClick={() => setFilters({ ...filters, [def.key]: selected ? val.filter(o => o !== opt) : [...val, opt] })}
                      className={`px-3 py-1.5 text-[11px] font-bold rounded-md transition ${selected ? 'bg-indigo-600 text-white' : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50'}`}>
                      {opt}
                    </button>
                  );
                })}
              </div>
            )}
            <div className="ml-auto flex items-center gap-2">
              <button onClick={() => setFilters({ ...filters, [def.key]: def.type === 'range' ? { min: '', max: '' } : (def.type === 'multi' ? [] : null) })}
                className="text-[11px] text-slate-500 hover:text-slate-700">이 필터 초기화</button>
              <button onClick={() => setOpenFilterKey(null)}
                className="px-3 py-1.5 text-[11px] font-semibold bg-slate-700 text-white rounded-md hover:bg-slate-800">적용 · 닫기</button>
            </div>
          </div>
        );
      })()}
    </header>
  );
}

/* ===== Map ===== */
function StylizedMap({ buildings, selectedId, onMarkerClick }) {
  return (
    <div className="absolute inset-0">
      <svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice" className="w-full h-full">
        <defs>
          <pattern id="grid" width="3" height="3" patternUnits="userSpaceOnUse">
            <path d="M 3 0 L 0 0 0 3" fill="none" stroke="#E2E8F0" strokeWidth="0.08" />
          </pattern>
          <radialGradient id="zone-CBD" cx="50%" cy="50%"><stop offset="0%" stopColor="#DC2626" stopOpacity="0.1" /><stop offset="100%" stopColor="#DC2626" stopOpacity="0" /></radialGradient>
          <radialGradient id="zone-GBD" cx="50%" cy="50%"><stop offset="0%" stopColor="#2563EB" stopOpacity="0.1" /><stop offset="100%" stopColor="#2563EB" stopOpacity="0" /></radialGradient>
          <radialGradient id="zone-YBD" cx="50%" cy="50%"><stop offset="0%" stopColor="#059669" stopOpacity="0.1" /><stop offset="100%" stopColor="#059669" stopOpacity="0" /></radialGradient>
          <radialGradient id="zone-BBD" cx="50%" cy="50%"><stop offset="0%" stopColor="#7C3AED" stopOpacity="0.1" /><stop offset="100%" stopColor="#7C3AED" stopOpacity="0" /></radialGradient>
        </defs>
        <rect width="100" height="100" fill="#F8FAFC" />
        <rect width="100" height="100" fill="url(#grid)" />
        <circle cx="54" cy="48" r="13" fill="url(#zone-CBD)" />
        <circle cx="66" cy="64" r="13" fill="url(#zone-GBD)" />
        <circle cx="42" cy="58" r="11" fill="url(#zone-YBD)" />
        <circle cx="66" cy="84" r="9"  fill="url(#zone-BBD)" />
        <path d="M 0 56 Q 25 52, 40 58 T 70 60 Q 85 62, 100 58 L 100 64 Q 85 67, 70 65 T 40 63 Q 25 57, 0 60 Z" fill="#BAE6FD" opacity="0.55" />
        <g opacity="0.2" stroke="#FCD34D" strokeWidth="0.25" fill="none">
          <path d="M 10 30 L 90 35" /><path d="M 15 70 L 85 75" />
          <path d="M 30 10 L 35 90" /><path d="M 70 10 L 75 90" />
          <path d="M 5 45 L 95 50" />
        </g>
        <text x="54" y="44" textAnchor="middle" fontSize="2.2" fontWeight="700" fill="#991B1B" opacity="0.35">CBD</text>
        <text x="66" y="60" textAnchor="middle" fontSize="2.2" fontWeight="700" fill="#1E40AF" opacity="0.35">GBD</text>
        <text x="42" y="55" textAnchor="middle" fontSize="2.2" fontWeight="700" fill="#065F46" opacity="0.35">YBD</text>
        <text x="66" y="80" textAnchor="middle" fontSize="2.2" fontWeight="700" fill="#5B21B6" opacity="0.35">BBD</text>
        <text x="54" y="50" textAnchor="middle" fontSize="1.5" fontWeight="600" fill="#64748B">서울특별시청</text>
        {buildings.map(b => {
          const color = REGION_COLORS[b.region];
          const isSelected = selectedId === b.id;
          return (
            <g key={b.id} transform={`translate(${b.x}, ${b.y})`} style={{ cursor: 'pointer' }} onClick={() => onMarkerClick(b.id)}>
              <ellipse cx="0" cy="0.5" rx={isSelected ? "2.5" : "1.8"} ry="0.5" fill="black" opacity="0.15" />
              <path d="M 0 -4 C -2.5 -4, -2.5 -1, 0 0 C 2.5 -1, 2.5 -4, 0 -4 Z"
                fill={color.bg} stroke="white" strokeWidth="0.3"
                transform={isSelected ? 'scale(1.4)' : 'scale(1)'} style={{ transition: 'transform 0.2s' }} />
              <circle cx="0" cy="-2.5" r="0.8" fill="white" />
              <g transform="translate(0, -6.2)">
                <rect x={-b.name.length * 0.9} y="-2.1" width={b.name.length * 1.8} height="2.9" rx="0.6"
                  fill={isSelected ? color.bg : '#1E293B'} opacity={isSelected ? 1 : 0.85} />
                <text textAnchor="middle" y="0" fontSize="1.6" fontWeight="700" fill="white">{b.name}</text>
              </g>
            </g>
          );
        })}
        <g transform="translate(85, 95)">
          <line x1="0" y1="0" x2="6" y2="0" stroke="#475569" strokeWidth="0.25" />
          <line x1="0" y1="-0.4" x2="0" y2="0.4" stroke="#475569" strokeWidth="0.25" />
          <line x1="6" y1="-0.4" x2="6" y2="0.4" stroke="#475569" strokeWidth="0.25" />
          <text x="3" y="-1" textAnchor="middle" fontSize="1.3" fill="#475569">4km</text>
        </g>
      </svg>
    </div>
  );
}

function MapLegend() {
  return (
    <div className="absolute bottom-4 left-4 bg-white/95 backdrop-blur-sm rounded-lg shadow-md border border-slate-200 px-3 py-2">
      <div className="text-[9px] font-bold text-slate-500 uppercase tracking-wider mb-1.5">권역 범례</div>
      <div className="space-y-1">
        {Object.entries(REGION_COLORS).map(([key, conf]) => (
          <div key={key} className="flex items-center gap-1.5">
            <div className="w-2.5 h-2.5 rounded-full" style={{ backgroundColor: conf.bg }} />
            <span className="text-[10px] font-semibold text-slate-700">{conf.name}</span>
            <span className="text-[9px] text-slate-400">{conf.label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function MapStats({ count, regionCount }) {
  return (
    <div className="absolute top-4 left-4 bg-white/95 backdrop-blur-sm rounded-lg shadow-md border border-slate-200 px-3 py-2">
      <div className="text-[9px] font-bold text-slate-500 uppercase tracking-wider">표시 중</div>
      <div className="text-xl font-bold text-slate-900">{count}<span className="text-xs font-normal text-slate-500 ml-0.5">개</span></div>
      <div className="text-[9px] text-slate-500">권역 {regionCount}/6</div>
    </div>
  );
}

/* ===== Detail Card ===== */
function DetailCard({ building, photoIdx, setPhotoIdx }) {
  const color = REGION_COLORS[building.region];
  const photoSlots = ['외관 사진', '내부 사진 1', '내부 사진 2', '내부 사진 3'];
  return (
    <section className="w-[260px] bg-white border-l border-slate-200 flex flex-col flex-shrink-0 overflow-hidden">
      <div className="px-3 py-2.5 border-b border-slate-200 text-center flex-shrink-0">
        <div className="text-[9px] font-semibold text-slate-500 uppercase tracking-wider mb-0.5">빌딩 이름</div>
        <h2 className="font-bold text-[15px] text-slate-900 tracking-tight truncate">{building.name}</h2>
      </div>
      <div className="flex-1 overflow-y-auto">
        <div className="relative aspect-[16/10] bg-gradient-to-br from-slate-200 to-slate-300 flex items-center justify-center">
          <ImageIcon size={28} className="text-slate-400" />
          <div className="absolute bottom-1.5 left-1.5 text-[9px] bg-black/50 text-white px-1.5 py-0.5 rounded">{photoSlots[photoIdx]}</div>
          {photoIdx > 0 && (
            <button onClick={() => setPhotoIdx(photoIdx - 1)}
              className="absolute left-1.5 top-1/2 -translate-y-1/2 w-6 h-6 rounded-full bg-white/90 shadow flex items-center justify-center hover:bg-white">
              <ChevronLeft size={12} />
            </button>
          )}
          <button onClick={() => setPhotoIdx(Math.min(photoSlots.length - 1, photoIdx + 1))}
            className="absolute right-1.5 top-1/2 -translate-y-1/2 w-6 h-6 rounded-full bg-white/90 shadow flex items-center justify-center hover:bg-white">
            <ChevronRight size={12} />
          </button>
        </div>
        <div className="grid grid-cols-2 border-b border-slate-100">
          <div className="px-3 py-2 border-r border-slate-100">
            <div className="text-[9px] font-semibold text-slate-500 uppercase mb-0.5">권역</div>
            <div className="flex items-center gap-1">
              <div className="w-2 h-2 rounded-full" style={{ backgroundColor: color.bg }} />
              <span className="text-[12px] font-bold" style={{ color: color.text }}>{color.name}</span>
            </div>
          </div>
          <div className="px-3 py-2">
            <div className="text-[9px] font-semibold text-slate-500 uppercase mb-0.5">전속</div>
            <div className={`inline-flex px-1.5 py-0.5 rounded text-[10px] font-bold ${building.exclusive ? 'bg-indigo-100 text-indigo-700' : 'bg-slate-100 text-slate-600'}`}>
              {building.exclusive ? '전속' : '비전속'}
            </div>
          </div>
        </div>
        <div className="grid grid-cols-2 border-b border-slate-100">
          <KV label="규모"        value={building.floors} border />
          <KV label="준공/리뉴얼" value={building.built} />
        </div>
        <div className="grid grid-cols-2 border-b border-slate-100">
          <KV label="연면적" value={`${(building.area / 1000).toFixed(1)}K평`} border />
          <KV label="전용률" value={`${building.occupancy}%`} />
        </div>
        <div className="grid grid-cols-2 border-b border-slate-100">
          <KV label="기준 임대(평)" value={building.baseLease} border />
          <KV label="기준 전용(평)" value={building.baseNet} />
        </div>
        <div className="px-3 py-2.5 border-b border-slate-100">
          <div className="text-[10px] font-bold text-slate-700 mb-1.5">공실 현황</div>
          <div className="grid grid-cols-12 gap-0 text-[8px] font-semibold text-slate-500 uppercase mb-1 pb-1 border-b border-slate-200">
            <div className="col-span-2">층</div>
            <div className="col-span-2 text-right">임대</div>
            <div className="col-span-2 text-right">전용</div>
            <div className="col-span-2 text-right">NOC</div>
            <div className="col-span-2">입주</div>
            <div className="col-span-2 text-right">담기</div>
          </div>
          {building.vacancies.map((v, i) => (
            <div key={i} className="grid grid-cols-12 gap-0 text-[9px] py-1 border-b last:border-b-0 border-slate-50 items-center">
              <div className="col-span-2 font-bold">{v.floor}</div>
              <div className="col-span-2 text-right">{v.area}</div>
              <div className="col-span-2 text-right">{v.net}</div>
              <div className="col-span-2 text-right">{v.noc}</div>
              <div className="col-span-2 text-slate-600 truncate">{v.when}</div>
              <div className="col-span-2 text-right">
                <button className="text-[8px] font-bold text-indigo-600 hover:text-indigo-800">+ 담기</button>
              </div>
            </div>
          ))}
          <div className="grid grid-cols-12 gap-0 text-[9px] py-1.5 mt-1 bg-slate-50 -mx-3 px-3 items-center">
            <div className="col-span-2 font-bold">총 공실</div>
            <div className="col-span-2 text-right font-semibold">{building.totalVacantArea}</div>
            <div className="col-span-2 text-right font-semibold">{building.totalVacantNet}</div>
            <div className="col-span-2 text-right text-slate-400">-</div>
            <div className="col-span-2 text-[8px] text-slate-500">임대/전용</div>
            <div className="col-span-2 text-right">
              <button className="text-[8px] font-bold text-slate-700">전체 담기</button>
            </div>
          </div>
        </div>
      </div>
      <div className="px-3 py-2.5 border-t border-slate-200 flex-shrink-0">
        <button className="w-full py-2 text-[11px] font-bold text-white rounded-lg shadow-sm hover:opacity-90 transition flex items-center justify-center gap-1.5"
          style={{ backgroundColor: color.bg }}>
          건물 상세보기 <ChevronRight size={12} />
        </button>
      </div>
    </section>
  );
}

function KV({ label, value, border }) {
  return (
    <div className={`px-3 py-2 ${border ? 'border-r border-slate-100' : ''}`}>
      <div className="text-[9px] font-semibold text-slate-500 uppercase mb-0.5">{label}</div>
      <div className="text-[11px] font-bold text-slate-900">{value}</div>
    </div>
  );
}

/* ===== Compact List ===== */
function CompactList({ buildings, selectedId, onSelect }) {
  return (
    <aside className="w-[220px] bg-slate-50 border-l border-slate-200 flex flex-col flex-shrink-0">
      <div className="px-3 py-2.5 border-b border-slate-200 bg-white flex items-center justify-between flex-shrink-0">
        <span className="text-[11px] font-bold text-slate-700">간략 리스트</span>
        <span className="text-[10px] font-bold text-slate-500 bg-slate-100 px-1.5 py-0.5 rounded-full">{buildings.length}개</span>
      </div>
      <div className="flex-1 overflow-y-auto p-2 space-y-1.5">
        {buildings.map(b => (
          <CompactItem key={b.id} building={b} selected={selectedId === b.id} onSelect={() => onSelect(b.id)} />
        ))}
      </div>
    </aside>
  );
}

function CompactItem({ building, selected, onSelect }) {
  const color = REGION_COLORS[building.region];
  return (
    <div onClick={onSelect}
      className={`bg-white rounded-lg border overflow-hidden cursor-pointer transition ${selected ? 'border-indigo-400 shadow-md ring-2 ring-indigo-100' : 'border-slate-200 hover:border-slate-300 hover:shadow-sm'}`}>
      <div className="flex gap-2 p-2">
        <div className="w-12 h-12 rounded bg-gradient-to-br from-slate-200 to-slate-300 flex-shrink-0 flex items-center justify-center relative overflow-hidden">
          <ImageIcon size={14} className="text-slate-400" />
          <div className="absolute top-0 left-0 w-1.5 h-full" style={{ backgroundColor: color.bg }} />
        </div>
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-1 mb-0.5">
            <span className="px-1 py-px text-[8px] font-bold rounded" style={{ backgroundColor: color.light, color: color.text }}>
              {color.name}
            </span>
            {building.exclusive && <span className="text-[8px] font-bold text-indigo-600">전속</span>}
          </div>
          <div className="text-[10px] font-bold text-slate-900 truncate">{building.name}</div>
          <div className="text-[9px] text-slate-500 truncate flex items-center gap-0.5">
            <MapPin size={8} /> {building.address}
          </div>
        </div>
      </div>
      <div className="grid grid-cols-2 gap-px bg-slate-100">
        <button onClick={(e) => { e.stopPropagation(); onSelect(); }}
          className="py-1.5 text-[10px] font-bold bg-white text-slate-700 hover:bg-slate-50">
          요약 이동
        </button>
        <button onClick={(e) => e.stopPropagation()}
          className="py-1.5 text-[10px] font-bold text-white hover:opacity-90"
          style={{ backgroundColor: color.bg }}>
          상세 이동
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<GenstarMate />);
</script>
</body>
</html>
