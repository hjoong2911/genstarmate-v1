              <th className="px-3 py-2 text-left">거래처명</th>
              <th className="px-3 py-2 text-left">사업자 형태</th>
              <th className="px-3 py-2 text-left">거래처 분류</th>
              <th className="px-3 py-2 text-right">임차 면적</th>
              <th className="px-3 py-2 text-left">만기일</th>
              <th className="px-3 py-2 text-center w-12">딜</th>
              <th className="px-3 py-2 text-left">담당자</th>
              <th className="px-3 py-2 text-center w-20">콜드콜</th>
              <th className="px-3 py-2 text-center w-24">고객 정보</th>
            </tr>
          </thead>
          <tbody>
            {paged.map(c => {
              const isStar = starred.has(c.id);
              const onCC = coldcallSet.has(c.id);
              return (
                <tr key={c.id} onClick={() => onOpenDetail(c.id)}
                  className="border-b border-slate-100 hover:bg-indigo-50/40 cursor-pointer transition">
                  <td className="px-3 py-2.5">
                    <div className="flex items-center gap-1.5">
                      <span className="font-semibold text-slate-800">{c.n}</span>
                      <span className={`px-1.5 py-0.5 text-[9px] font-bold rounded ${GRADE_STYLES[c.g] || GRADE_STYLES.E}`}>{c.g}</span>
                    </div>
                  </td>
                  <td className="px-3 py-2.5 text-slate-600">{c.구}</td>
                  <td className="px-3 py-2.5 text-slate-600">{c.규}</td>
                  <td className="px-3 py-2.5 text-right tabular-nums">{areaCell(c)} 평</td>
                  <td className="px-3 py-2.5 tabular-nums">{expiryCell(c)}</td>
                  <td className="px-3 py-2.5 text-center">
                    <span className={`px-1.5 py-0.5 text-[10px] font-bold rounded ${c.딜 === 'Y' ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-500'}`}>{c.딜}</span>
                  </td>
                  <td className="px-3 py-2.5 text-slate-600">{c.담}</td>
                  <td className="px-3 py-2.5 text-center">
                    <button onClick={e => { e.stopPropagation(); toggleColdcall(c.id); }}
                      className={`px-2 py-0.5 text-[10px] font-bold rounded border ${onCC ? 'border-emerald-300 bg-emerald-50 text-emerald-700' : 'border-slate-200 text-slate-500 hover:bg-slate-50'}`}>
                      {onCC ? '콜드콜 ✓' : '콜드콜+'}
                    </button>
                  </td>
                  <td className="px-3 py-2.5 text-center">
                    <button onClick={e => { e.stopPropagation(); onOpenDetail(c.id); }}
                      className="px-3 py-1 text-[10px] font-bold bg-indigo-600 text-white rounded hover:bg-indigo-700">상세 보기</button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      <div className="bg-white border-t border-slate-200 px-4 py-2 flex items-center justify-between text-[10px] flex-shrink-0">
        <div className="flex gap-3 text-slate-500">
          <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-emerald-500"/> 확정</span>
          <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-amber-500"/> 예상</span>
          <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-slate-400"/> 미확인</span>
          <span className="ml-3 flex items-center gap-1">
            {['A','B','C','D','E','F'].map(g => <span key={g} className={`px-1 py-0.5 rounded text-[9px] font-bold ${GRADE_STYLES[g]}`}>{g}</span>)}
          </span>
        </div>
        <div className="flex items-center gap-1">
          <button onClick={() => setPage(p => Math.max(1, p-1))} disabled={page === 1}
            className="px-2 py-0.5 disabled:opacity-30">‹</button>
          {Array.from({length: totalPages}).map((_, i) => (
            <button key={i} onClick={() => setPage(i+1)}
              className={`px-2 py-0.5 rounded ${page === i+1 ? 'bg-indigo-600 text-white font-bold' : 'hover:bg-slate-100'}`}>{i+1}</button>
          ))}
          <button onClick={() => setPage(p => Math.min(totalPages, p+1))} disabled={page === totalPages}
            className="px-2 py-0.5 disabled:opacity-30">›</button>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
 * CompanyDetailPage - 거래처 상세 페이지
 * ============================================================ */
function CompanyDetailPage({ companyId, onBack }) {
  const c = COMPANIES.find(x => x.id === companyId);
  if (!c) return <div className="flex-1 flex items-center justify-center text-slate-400">거래처를 찾을 수 없습니다</div>;

  const [memoInput, setMemoInput] = useState('');
  const [localMemos, setLocalMemos] = useState([]);
  const [grade, setGrade] = useState(c.g);

  const hCd = c.확만 !== '-';
  const hCa = c.확임 !== '-';
  const initials = c.n.replace(/[^\uAC00-\uD7A3]/g, '').slice(0, 2) || c.n.slice(0, 2);

  const addMemo = () => {
    if (!memoInput.trim()) return;
    const now = new Date();
    const dt = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    setLocalMemos(prev => [{ d: dt, t: memoInput }, ...prev]);
    setMemoInput('');
  };

  const Row = ({ k, v, highlight }) => (
    <div className="grid grid-cols-12 border-t border-slate-100 text-[11px]">
      <div className="col-span-3 bg-slate-50 px-3 py-2 font-semibold text-slate-600 border-r border-slate-100 flex items-center">{k}</div>
      <div className={`col-span-9 px-3 py-2 ${highlight === 'g' ? 'text-emerald-600 font-semibold' : highlight === 'w' ? 'text-amber-600' : 'text-slate-800'}`}>{v}</div>
    </div>
  );
  const Pair = ({ k1, v1, k2, v2, h1, h2 }) => (
    <div className="grid grid-cols-12 border-t border-slate-100 text-[11px]">
      <div className="col-span-3 bg-slate-50 px-3 py-2 font-semibold text-slate-600 border-r border-slate-100 flex items-center">{k1}</div>
      <div className={`col-span-3 px-3 py-2 border-r border-slate-100 ${h1 === 'g' ? 'text-emerald-600 font-semibold' : h1 === 'w' ? 'text-amber-600' : 'text-slate-800'}`}>{v1}</div>
      <div className="col-span-3 bg-slate-50 px-3 py-2 font-semibold text-slate-600 border-r border-slate-100 flex items-center">{k2}</div>
      <div className={`col-span-3 px-3 py-2 ${h2 === 'g' ? 'text-emerald-600 font-semibold' : h2 === 'w' ? 'text-amber-600' : 'text-slate-800'}`}>{v2}</div>
    </div>
  );

  return (
    <div className="flex-1 overflow-auto bg-slate-50">
      {/* Top nav */}
      <div className="bg-white border-b border-slate-200 px-5 py-2.5 flex items-center justify-between flex-shrink-0 sticky top-0 z-10">
        <div className="flex items-center gap-3">
          <button onClick={onBack}
            className="flex items-center gap-1 px-2 py-1 rounded hover:bg-slate-100 text-slate-600 hover:text-indigo-600 text-[12px] font-semibold transition">
            <ChevronLeft size={14} /> 뒤로 가기
          </button>
          <div className="h-4 w-px bg-slate-200" />
          <span className={`px-2 py-0.5 text-[10px] font-bold rounded ${GRADE_STYLES[grade]}`}>{grade}</span>
          <h1 className="font-bold text-[16px] text-slate-900">{c.n}</h1>
        </div>
        <div className="flex items-center gap-2">
          <button className="px-3 py-1.5 text-[11px] font-semibold border border-slate-200 rounded text-slate-700 hover:bg-slate-50">수정</button>
          <button className="px-3 py-1.5 text-[11px] font-bold bg-emerald-600 text-white rounded hover:bg-emerald-700">콜드콜 등록</button>
          <button className="px-3 py-1.5 text-[11px] font-bold bg-indigo-600 text-white rounded hover:bg-indigo-700">딜 전환 ↗</button>
        </div>
      </div>

      <div className="p-5 space-y-4">
        {/* Header card */}
        <div className="bg-indigo-50 border border-indigo-200 rounded-lg p-5">
          <div className="flex gap-4">
            <div className="w-14 h-14 rounded-lg bg-indigo-600 text-white flex items-center justify-center text-[15px] font-bold flex-shrink-0">{initials}</div>
            <div className="flex-1">
              <div className="text-[18px] font-bold text-indigo-900">{c.n}</div>
              <div className="flex items-center gap-2 mt-1.5 flex-wrap">
                <span className={`px-2 py-0.5 text-[11px] font-bold rounded ${GRADE_STYLES[grade]}`}>{grade}</span>
                <select value={grade} onChange={e => setGrade(e.target.value)}
                  className="px-2 py-0.5 text-[11px] font-semibold bg-white border border-indigo-200 rounded text-indigo-900 outline-none">
                  {['A','B','C','D','E','F'].map(g => <option key={g}>{g}</option>)}
                </select>
                <span className={`px-2 py-0.5 text-[10px] font-bold rounded ${hCd ? 'bg-emerald-100 text-emerald-700' : c.예유 === 'Y' ? 'bg-amber-100 text-amber-700' : 'bg-slate-100 text-slate-600'}`}>
                  {hCd ? '확정' : c.예유 === 'Y' ? '예상' : '미확인'}

                <span className="text-[11px] text-indigo-700">{c.담} 담당 · 최근 {c.접}</span>

          <Pair k1="거래처 국가" v1={c.국} k2="비활성 대상" v2={c.비} />
        </Section>

        {/* 현재 사무실 */}

function MultiOpts({ opts, selected, onToggle, renderLabel, keyOf }) {
  const k = keyOf || (v => v);
  const rl = renderLabel || (v => v);
  return (
    <div className="flex flex-col gap-0.5 max-h-48 overflow-y-auto">
      {opts.map(o => (
        <label key={o} className="flex items-center gap-2 px-1.5 py-1 text-[12px] hover:bg-slate-50 rounded cursor-pointer">
          <input type="checkbox" checked={selected.includes(k(o))}
            onChange={() => onToggle(o)} className="accent-indigo-600"/>
          {rl(o)}
        </label>
      ))}
    </div>
  );
}

function RadioOpts({ name, opts, value, onChange }) {
  return (
    <div className="flex flex-col gap-0.5">
      {opts.map(([v, l]) => (
        <label key={v} className="flex items-center gap-2 px-1.5 py-1 text-[12px] hover:bg-slate-50 rounded cursor-pointer">
          <input type="radio" name={name} checked={value === v}
            onChange={() => onChange(v)} className="accent-indigo-600"/>
          {l}
        </label>
      ))}
    </div>
  );
}

function DateRange({ minVal, maxVal, onMin, onMax }) {

}

function NumRange({ minVal, maxVal, onMin, onMax, unit }) {

/* ColdcallPage: 전체/My 콜드콜 리스트 */
function ColdcallPage({ onlyMy, onOpenColdcall }) {
  const [sort, setSort] = useState('recent');
  const [perPage, setPerPage] = useState(15);
  const [page, setPage] = useState(1);
  const [openF, setOpenF] = useState(null);
  const [filters, setFilters] = useState({
    name: '', status: [], grade: [], manager: [],
    callSuccess: 'all', tip: 'all', recallDate: ['',''], lastContact: ['',''],
    expDate: ['',''], cfDate: ['',''], expArea: ['',''], cfArea: ['',''],
    led: 'all', mainContact: 'all', callCount: ['',''], expiryType: 'all',
  });

  const updateF = (k, v) => setFilters(p => ({ ...p, [k]: v }));
  const toggleArr = (k, v) => setFilters(p => ({ ...p, [k]: p[k].includes(v) ? p[k].filter(x => x !== v) : [...p[k], v] }));
  const hasV = (k) => {
    const v = filters[k];
    if (Array.isArray(v)) {
      if (v.length === 2 && typeof v[0] === 'string' && (v[0] !== '' || v[1] !== '')) return true;
      return v.length > 0 && typeof v[0] !== 'string';
    }
    return v && v !== 'all' && v !== '';
  };
  const resetAll = () => setFilters({
    name: '', status: [], grade: [], manager: [],
    callSuccess: 'all', tip: 'all', recallDate: ['',''], lastContact: ['',''],
    expDate: ['',''], cfDate: ['',''], expArea: ['',''], cfArea: ['',''],
    led: 'all', mainContact: 'all', callCount: ['',''], expiryType: 'all',
  });

  useEffect(() => {
    const h = (e) => { if (!e.target.closest('.f-btn-wrap')) setOpenF(null); };
    document.addEventListener('click', h);
    return () => document.removeEventListener('click', h);
  }, []);

  const parseNum = (s) => parseInt(String(s).replace(/[^0-9]/g,'')) || 0;
  const filtered = useMemo(() => {
    let arr = COLDCALLS.filter(c => {
      if (onlyMy && c.mgr !== '박지혜') return false;
      if (filters.name && !c.co.toLowerCase().includes(filters.name.toLowerCase())) return false;
      if (filters.status.length > 0 && !filters.status.includes(c.st)) return false;
      if (filters.grade.length > 0 && !filters.grade.includes(c.cg)) return false;
      if (filters.manager.length > 0 && !filters.manager.includes(c.mgr)) return false;
      if (filters.callSuccess !== 'all' && c.sc !== filters.callSuccess) return false;
      if (filters.tip !== 'all' && c.tip !== filters.tip) return false;
      if (filters.led !== 'all' && c.led !== filters.led) return false;
      if (filters.mainContact !== 'all' && c.pd !== filters.mainContact) return false;
      const ef = parseNum(c.ef), cf = parseNum(c.cf);
      if (filters.expArea[0] && ef < +filters.expArea[0]) return false;
      if (filters.expArea[1] && ef > +filters.expArea[1]) return false;
      if (filters.cfArea[0] && cf < +filters.cfArea[0]) return false;
      if (filters.cfArea[1] && cf > +filters.cfArea[1]) return false;
      if (filters.callCount[0] && c.cnt < +filters.callCount[0]) return false;
      if (filters.callCount[1] && c.cnt > +filters.callCount[1]) return false;
      if (filters.expiryType === '예상' && c.em === '-') return false;
      if (filters.expiryType === '확정' && c.cm === '-') return false;
      if (filters.expiryType === '미확인' && (c.em !== '-' || c.cm !== '-')) return false;
      return true;
    });
    arr.sort((a, b) => {
      switch (sort) {
        case 'recallDate': return (a.rc === '-' ? 'zzz' : a.rc).localeCompare(b.rc === '-' ? 'zzz' : b.rc);
        case 'grade': return a.cg.localeCompare(b.cg);
        case 'callCount': return b.cnt - a.cnt;
        case 'expiry': return (a.cm !== '-' ? a.cm : a.em).localeCompare(b.cm !== '-' ? b.cm : b.em);
        case 'name': return a.co.localeCompare(b.co, 'ko');
        case 'recent':
        default: return b.lc.localeCompare(a.lc);
      }
    });
    return arr;
  }, [onlyMy, sort, filters]);

  const totalPages = Math.max(1, Math.ceil(filtered.length / perPage));
  const paged = filtered.slice((page-1)*perPage, page*perPage);
  useEffect(() => { if (page > totalPages) setPage(1); }, [totalPages, page]);

  return (
    <div className="flex-1 flex flex-col overflow-hidden bg-slate-50">

          <button onClick={resetAll} className="px-2.5 py-1.5 text-[11px] text-slate-600 hover:text-indigo-600">↺ 초기화</button>
          <button className="px-3 py-1.5 text-[11px] font-bold bg-indigo-600 text-white rounded hover:bg-indigo-700">+ 콜 추가</button>
        </div>

            placeholder="검색어 입력" className="w-full px-2 py-1 text-[12px] border border-slate-200 rounded outline-none focus:border-indigo-400"/>
        </FilterBtn>
        <FilterBtn label="콜 상태" k="cc-st" openF={openF} setOpenF={setOpenF} hasValue={hasV('status')}>

        </FilterBtn>

          <MultiOpts opts={['A','B','C','D','E','F']} selected={filters.grade} onToggle={v => toggleArr('grade', v)}/>

        </FilterBtn>
        {onlyMy && <FilterBtn label="만기일 구분" k="cc-mk" openF={openF} setOpenF={setOpenF} hasValue={hasV('expiryType')}>

          <FilterBtn label="확정 임차 면적(평)" k="cc-cf" openF={openF} setOpenF={setOpenF} hasValue={hasV('cfArea')}>

          <FilterBtn label="리드 전환 여부" k="cc-ld" openF={openF} setOpenF={setOpenF} hasValue={hasV('led')}>

          </FilterBtn>
          <FilterBtn label="만기일 구분" k="cc-mk2" openF={openF} setOpenF={setOpenF} hasValue={hasV('expiryType')}>
            <RadioOpts name="cc-mk2" opts={[['all','전체'],['예상','예상 만기일'],['확정','확정 만기일'],['미확인','미확인']]} value={filters.expiryType} onChange={v => updateF('expiryType', v)}/>
          </FilterBtn>
          <select value={sort} onChange={e => setSort(e.target.value)}
            className="ml-auto px-2.5 py-1.5 text-[11px] border border-slate-200 rounded font-semibold text-slate-700 bg-white outline-none focus:border-indigo-400">
            <option value="recent">최근 연락순</option>
            <option value="recallDate">재콜 예정일순</option>
            <option value="grade">등급 높은순</option>
            <option value="callCount">통화 횟수순</option>
            <option value="name">가나다순</option>
          </select>
        </div>
      )}

      <div className="bg-white px-4 py-2 flex items-center justify-between flex-shrink-0 border-b border-slate-100 text-[12px]">
        <div className="font-semibold">총 <span className="text-rose-600 font-bold">{filtered.length}</span> 건 · {page}/{totalPages} 페이지</div>
        <select value={perPage} onChange={e => { setPerPage(+e.target.value); setPage(1); }}
          className="px-2 py-1 text-[11px] border border-slate-200 rounded font-semibold text-slate-700 bg-white outline-none focus:border-indigo-400">
          <option value={15}>15개씩</option>
          <option value={30}>30개씩</option>
          <option value={50}>50개씩</option>

      </div>

      <div className="flex-1 overflow-auto">
        <table className="w-full text-[11px] bg-white">
          <thead className="bg-slate-50 sticky top-0 z-10">
            <tr className="text-slate-500 font-semibold border-b border-slate-200">
              <th className="px-3 py-2 text-left">거래처명</th>
              <th className="px-3 py-2 text-left">콜 상태</th>
              {!onlyMy && <th className="px-3 py-2 text-left">콜 담당자</th>}
              <th className="px-3 py-2 text-left">최근 연락일</th>
              {!onlyMy && <th className="px-3 py-2 text-center w-16">통화 성공</th>}
              <th className="px-3 py-2 text-center w-12">팁</th>
              <th className="px-3 py-2 text-left">재콜 예정일</th>
              <th className="px-3 py-2 text-center w-14">횟수</th>
              <th className="px-3 py-2 text-center w-24">상세</th>
            </tr>
          </thead>
          <tbody>
            {paged.map(c => (
              <tr key={c.id} onClick={() => onOpenColdcall(c.id)} className="border-b border-slate-100 hover:bg-indigo-50/40 cursor-pointer transition">
                <td className="px-3 py-2.5"><div className="flex items-center gap-1.5"><span className="font-semibold text-slate-800">{c.co}</span><span className={`px-1.5 py-0.5 text-[9px] font-bold rounded ${GRADE_STYLES[c.cg] || GRADE_STYLES.E}`}>{c.cg}</span></div></td>

                <td className="px-3 py-2.5 text-center font-semibold" style={{color: c.tip==='Y' ? '#534AB7' : '#888'}}>{c.tip}</td>
                <td className="px-3 py-2.5 tabular-nums font-semibold" style={{color: c.rc !== '-' ? '#BA7517' : '#aaa'}}>{c.rc !== '-' ? c.rc : '—'}</td>
                <td className="px-3 py-2.5 text-center text-slate-600 tabular-nums">{c.cnt}회</td>
                <td className="px-3 py-2.5 text-center">
                  <button onClick={e => { e.stopPropagation(); onOpenColdcall(c.id); }}
                    className="px-3 py-1 text-[10px] font-bold bg-indigo-600 text-white rounded hover:bg-indigo-700">상세 보기</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <div className="bg-white border-t border-slate-200 px-4 py-2 flex items-center justify-between text-[10px] flex-shrink-0">
        <div className="flex gap-1.5 flex-wrap">
          {Object.entries(COLDCALL_STATUS_STYLES).map(([k, [bg, c]]) => (
            <span key={k} style={{display:'inline-block',padding:'2px 8px',borderRadius:4,fontSize:10,fontWeight:500,background:bg,color:c}}>{k}</span>
          ))}
        </div>
        <div className="flex items-center gap-1 text-[11px]">
          <button onClick={() => setPage(p => Math.max(1, p-1))} disabled={page === 1} className="px-2 py-0.5 disabled:opacity-30">‹</button>
          {Array.from({length: totalPages}).map((_, i) => (
            <button key={i} onClick={() => setPage(i+1)} className={`px-2 py-0.5 rounded ${page === i+1 ? 'bg-indigo-600 text-white font-bold' : 'hover:bg-slate-100'}`}>{i+1}</button>
          ))}
          <button onClick={() => setPage(p => Math.min(totalPages, p+1))} disabled={page === totalPages} className="px-2 py-0.5 disabled:opacity-30">›</button>
        </div>
      </div>
    </div>
  );
}

        <div className="flex items-center gap-3">
          <button onClick={onBack} className="flex items-center gap-1 px-2 py-1 rounded hover:bg-slate-100 text-slate-600 hover:text-indigo-600 text-[12px] font-semibold">
            <ChevronLeft size={14} /> 뒤로 가기
          </button>
          <div className="h-4 w-px bg-slate-200" />

function ColdcallDetailBody({ c, hideHeader }) {
  const [memoInput, setMemoInput] = useState('');
  const [addedMemos, setAddedMemos] = useState([]);
  const addMemo = () => {
    if (!memoInput.trim()) return;
    const now = new Date();
    const dt = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    setAddedMemos(prev => [{ d: dt, t: memoInput }, ...prev]);
    setMemoInput('');
  };
  const KV = ({ k, v, tone }) => (
    <React.Fragment>
      <div className="bg-slate-50 px-3 py-2 text-[11px] text-slate-500 border-r border-b border-slate-100">{k}</div>
      <div className={`px-3 py-2 text-[12px] font-semibold border-r border-b border-slate-100 ${tone === 'g' ? 'text-emerald-600' : tone === 'w' ? 'text-amber-600' : 'text-slate-800'}`}>{v}</div>
    </React.Fragment>
  );
  return (
    <>
      {!hideHeader && (
        <div className="bg-sky-50 border border-sky-200 rounded-lg p-4 mb-4">
          <div className="grid grid-cols-4 gap-2">
            <div className="bg-white border border-sky-200 rounded-lg px-3 py-2"><div className="text-[10px] text-sky-700 font-semibold">통화 횟수</div><div className="text-[14px] font-bold mt-0.5 text-sky-900">{c.cnt}회</div></div>
            <div className="bg-white border border-sky-200 rounded-lg px-3 py-2"><div className="text-[10px] text-sky-700 font-semibold">최근 연락일</div><div className="text-[14px] font-bold mt-0.5 text-sky-900">{c.lc}</div></div>
            <div className="bg-white border border-sky-200 rounded-lg px-3 py-2"><div className="text-[10px] text-sky-700 font-semibold">재콜 예정일</div><div className={`text-[14px] font-bold mt-0.5 ${c.rc !== '-' ? 'text-amber-600' : 'text-slate-400'}`}>{c.rc !== '-' ? c.rc : '미등록'}</div></div>
            <div className="bg-white border border-sky-200 rounded-lg px-3 py-2"><div className="text-[10px] text-sky-700 font-semibold">리드 전환</div><div className={`text-[14px] font-bold mt-0.5 ${c.led === 'Y' ? 'text-emerald-600' : 'text-slate-400'}`}>{c.led === 'Y' ? '전환 완료' : '미전환'}</div></div>
          </div>
        </div>
      )}

      <div className="px-3 py-2 rounded-lg mt-4 mb-2 text-[12px] font-bold bg-indigo-50 text-indigo-900">📞 통화 작업 정보</div>
      <div className="grid grid-cols-4 border border-slate-200 rounded-lg overflow-hidden text-[11px]">
        <KV k="콜 상태" v={<ColdcallStatusPill status={c.st}/>}/>
        <KV k="콜 담당자" v={c.mgr}/>
        <KV k="통화 성공" v={c.sc} tone={c.sc === 'Y' ? 'g' : ''}/>
        <KV k="통화 횟수" v={`${c.cnt}회`}/>
        <KV k="재콜 예정일" v={c.rc !== '-' ? c.rc : '미등록'} tone={c.rc !== '-' ? 'w' : ''}/>
        <KV k="팁 유무" v={c.tip} tone={c.tip === 'Y' ? 'g' : ''}/>
        <KV k="리드 전환" v={c.led} tone={c.led === 'Y' ? 'g' : ''}/>
        <KV k="주담당자 연락처" v={c.pd} tone={c.pd === 'Y' ? 'g' : ''}/>
      </div>

      <div className="px-3 py-2 rounded-lg mt-4 mb-2 text-[12px] font-bold bg-emerald-50 text-emerald-900">👤 주 담당자 컨택</div>
      <div className="grid grid-cols-4 border border-slate-200 rounded-lg overflow-hidden text-[11px]">
        <KV k="담당자명" v={c.pdN}/>
        <KV k="직책" v={c.pdT}/>
        <KV k="연락처" v={c.pdP}/>
        <KV k="" v=""/>
      </div>

      <div className="px-3 py-2 rounded-lg mt-4 mb-2 text-[12px] font-bold bg-slate-100 text-slate-700">🕒 통화 이력</div>
      <div className="border border-indigo-200 rounded-lg overflow-hidden mb-3">
        <div className="bg-indigo-50 px-3 py-2 text-[11px] font-semibold text-indigo-900 border-b border-indigo-200">✏️ 메모 직접 입력</div>
        {addedMemos.map((m, i) => (
          <div key={i} className="px-3 py-2 text-[12px] border-b border-slate-100 last:border-0 bg-white">
            <span className="text-[10px] text-slate-400">{m.d}</span>
            <div className="mt-0.5">{m.t}</div>
          </div>
        ))}
        <textarea value={memoInput} onChange={e => setMemoInput(e.target.value)} rows={2}
          placeholder="통화 결과 메모를 입력하세요..."
          className="w-full px-3 py-2 text-[12px] outline-none resize-none"/>
        <div className="flex justify-end px-3 py-1.5 bg-slate-50 border-t border-slate-100">
          <button onClick={addMemo} className="px-3 py-1 text-[11px] font-bold bg-slate-800 text-white rounded hover:bg-slate-900">메모 추가</button>
        </div>
      </div>
      <div className="border border-slate-200 rounded-lg px-4">
        {c.calls.map((x, i) => (
          <div key={i} className="flex gap-2 py-2.5 border-b border-slate-100 last:border-0">
            <span className={`w-2 h-2 rounded-full mt-1.5 ${x.res === 'ok' ? 'bg-emerald-500' : 'bg-amber-500'}`}/>
            <div className="flex-1">
              <div className="flex items-center gap-1.5 mb-1 flex-wrap">
                <span className="text-[10px] text-slate-500">{x.d}</span>
                <span className={`px-2 py-0.5 text-[10px] font-semibold rounded ${x.res === 'ok' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'}`}>
                  {x.res === 'ok' ? '통화 성공' : '부재'}
                </span>
                <span className="text-[10px] text-slate-500">· {x.by}</span>
              </div>
              <div className="text-[12px]">{x.m}</div>
            </div>
          </div>
        ))}
      </div>
    </>
  );
}

function DealStatusPill({ status }) {
  const [bg, c] = DEAL_STATUS_STYLES[status] || ['#f2f2f0','#888888'];
  return <span style={{display:'inline-block',padding:'3px 10px',borderRadius:5,fontSize:11,fontWeight:500,background:bg,color:c}}>{status}</span>;
}
function DealRegionPill({ region }) {
  const [bg, c] = DEAL_REGION_PILL[region] || ['#f5f5f7','#666'];
  return <span style={{display:'inline-block',padding:'2px 8px',borderRadius:4,fontSize:11,fontWeight:500,background:bg,color:c}}>{region}</span>;
}
function ExpiryBadge({ value, type }) {
  const isCf = type === '확정';
  return (
    <span>
      <span style={{fontWeight:500, color: isCf ? '#1D9E75' : '#BA7517'}}>{value}</span>
      <span className="ml-1 px-1 py-0.5 text-[9px] font-bold rounded" style={{background: isCf ? '#E1F5EE' : '#FAEEDA', color: isCf ? '#085041' : '#633806'}}>{type}</span>
    </span>
  );
}

function DealsPage({ onlyMy, onOpenDeal }) {
  const [sort, setSort] = useState('contractDate');
  const [perPage, setPerPage] = useState(15);
  const [page, setPage] = useState(1);
  const [openF, setOpenF] = useState(null);
  const [filters, setFilters] = useState({
    company:'', status:[], grade:[], manager:[], region:[],
    contractDate:['',''], areaRange:['',''], building:'',
    expDate:['',''], genDate:['',''], coldStatus:[],
  });
  const updateF = (k, v) => setFilters(p => ({ ...p, [k]: v }));
  const toggleArr = (k, v) => setFilters(p => ({ ...p, [k]: p[k].includes(v) ? p[k].filter(x => x !== v) : [...p[k], v] }));
  const hasV = (k) => {
    const v = filters[k];
    if (Array.isArray(v)) {
      if (v.length === 2 && typeof v[0] === 'string' && (v[0] !== '' || v[1] !== '')) return true;
      return v.length > 0 && typeof v[0] !== 'string';
    }
    return v && v !== '';
  };
  const resetAll = () => setFilters({
    company:'', status:[], grade:[], manager:[], region:[],
    contractDate:['',''], areaRange:['',''], building:'',
    expDate:['',''], genDate:['',''], coldStatus:[],
  });
  useEffect(() => {
    const h = (e) => { if (!e.target.closest('.f-btn-wrap')) setOpenF(null); };
    document.addEventListener('click', h);
    return () => document.removeEventListener('click', h);
  }, []);
  const parseNum = (s) => parseInt(String(s).replace(/[^0-9]/g,'')) || 0;
  const filtered = useMemo(() => {
    let arr = DEALS.filter(d => {
      if (onlyMy && d.mgr !== '김민수' && d.mgr !== '이수진') return false;
      if (filters.company && !d.co.toLowerCase().includes(filters.company.toLowerCase())) return false;
      if (filters.status.length > 0 && !filters.status.includes(d.st)) return false;
      if (filters.grade.length > 0 && !filters.grade.includes(d.cg)) return false;
      if (filters.manager.length > 0 && !filters.manager.includes(d.mgr)) return false;
      if (filters.region.length > 0 && !filters.region.includes(d.region)) return false;
      if (filters.coldStatus.length > 0 && !filters.coldStatus.includes(d.cc_st)) return false;
      if (filters.building && !(d.b1 + d.b2).toLowerCase().includes(filters.building.toLowerCase())) return false;
      const a = parseNum(d.area);
      if (filters.areaRange[0] && a < +filters.areaRange[0]) return false;
      if (filters.areaRange[1] && a > +filters.areaRange[1]) return false;
      const ec = d.ec.replace(/\./g, '-');
      if (filters.contractDate[0] && ec < filters.contractDate[0]) return false;
      if (filters.contractDate[1] && ec > filters.contractDate[1]) return false;
      const ex = d.expiry.replace(/\./g, '-');
      if (filters.expDate[0] && ex < filters.expDate[0]) return false;
      if (filters.expDate[1] && ex > filters.expDate[1]) return false;
      const ge = d.gen.replace(/\./g, '-');
      if (filters.genDate[0] && ge < filters.genDate[0]) return false;
      if (filters.genDate[1] && ge > filters.genDate[1]) return false;
      return true;
    });
    arr.sort((a, b) => {
      switch (sort) {
        case 'expiry': return a.expiry.localeCompare(b.expiry);
        case 'area': return parseNum(b.area) - parseNum(a.area);
        case 'grade': return a.cg.localeCompare(b.cg);
        case 'recent': return b.gen.localeCompare(a.gen);
        case 'contractDate':
        default: return a.ec.localeCompare(b.ec);
      }
    });
    return arr;
  }, [onlyMy, sort, filters]);
  const totalPages = Math.max(1, Math.ceil(filtered.length / perPage));
  const paged = filtered.slice((page-1)*perPage, page*perPage);
  useEffect(() => { if (page > totalPages) setPage(1); }, [totalPages, page]);

  return (
    <div className="flex-1 flex flex-col overflow-hidden bg-slate-50">
      <div className="bg-white border-b border-slate-200 px-5 py-3 flex items-center justify-between flex-shrink-0">
        <div className="flex items-center gap-3">
          <div className="w-7 h-7 rounded-lg bg-amber-100 flex items-center justify-center text-amber-700">💼</div>
          <h1 className="font-bold text-[15px] text-slate-900">{onlyMy ? 'My 딜' : '전체 딜'}</h1>
          <span className="text-[11px] text-slate-400">{onlyMy ? '담당 딜 목록' : '영업 파이프라인 현황'}</span>
        </div>
        <div className="flex items-center gap-2">
          <button onClick={resetAll} className="px-2.5 py-1.5 text-[11px] text-slate-600 hover:text-indigo-600">↺ 초기화</button>
          <button className="px-3 py-1.5 text-[11px] font-bold bg-indigo-600 text-white rounded hover:bg-indigo-700">+ 딜 등록</button>
        </div>
      </div>

      <div className="bg-white px-4 py-2 flex items-center gap-1.5 flex-wrap flex-shrink-0 border-b border-slate-100">
        <span className="text-[11px] text-slate-500 font-semibold mr-1">필터</span>
        <FilterBtn label="🔍 거래처명" k="dl-co" openF={openF} setOpenF={setOpenF} hasValue={hasV('company')}>
          <input type="text" value={filters.company} onChange={e => updateF('company', e.target.value)}
            placeholder="검색어 입력" className="w-full px-2 py-1 text-[12px] border border-slate-200 rounded outline-none focus:border-indigo-400"/>
        </FilterBtn>
        <FilterBtn label="딜 상태" k="dl-st" openF={openF} setOpenF={setOpenF} hasValue={hasV('status')}>
          <MultiOpts opts={['검토중','협의중','제안완료','계약진행','완료','무산']} selected={filters.status} onToggle={v => toggleArr('status', v)}/>
        </FilterBtn>
        {!onlyMy && <FilterBtn label="☆ 거래처 등급" k="dl-gr" openF={openF} setOpenF={setOpenF} hasValue={hasV('grade')}>
          <MultiOpts opts={['A','B','C','D','E','F']} selected={filters.grade} onToggle={v => toggleArr('grade', v)}/>
        </FilterBtn>}
        {!onlyMy && <FilterBtn label="담당 세일즈" k="dl-mg" openF={openF} setOpenF={setOpenF} hasValue={hasV('manager')}>
          <MultiOpts opts={['김민수','이수진','박준호','한소연','정대한']} selected={filters.manager} onToggle={v => toggleArr('manager', v)}/>
        </FilterBtn>}
        <FilterBtn label="권역" k="dl-rg" openF={openF} setOpenF={setOpenF} hasValue={hasV('region')}>
          <MultiOpts opts={['CBD','GBD','YBD','기타']} selected={filters.region} onToggle={v => toggleArr('region', v)}/>
        </FilterBtn>
        {onlyMy && (
          <select value={sort} onChange={e => setSort(e.target.value)}
            className="ml-auto px-2.5 py-1.5 text-[11px] border border-slate-200 rounded font-semibold text-slate-700 bg-white outline-none focus:border-indigo-400">
            <option value="contractDate">예상 계약일 임박순</option>
            <option value="expiry">만기일 임박순</option>
            <option value="area">면적 큰순</option>
            <option value="recent">최근 생성순</option>
          </select>
        )}
      </div>

      {!onlyMy && (
        <div className="bg-white px-4 py-2 flex items-center gap-1.5 flex-wrap flex-shrink-0 border-b border-slate-200">
          <span className="text-[11px] text-slate-300 mr-1">　</span>
          <FilterBtn label="📅 예상 계약일" k="dl-ec" openF={openF} setOpenF={setOpenF} hasValue={hasV('contractDate')}>
            <DateRange minVal={filters.contractDate[0]} maxVal={filters.contractDate[1]} onMin={v => updateF('contractDate', [v, filters.contractDate[1]])} onMax={v => updateF('contractDate', [filters.contractDate[0], v])}/>
          </FilterBtn>
          <FilterBtn label="예상 면적(평)" k="dl-ar" openF={openF} setOpenF={setOpenF} hasValue={hasV('areaRange')}>
            <NumRange minVal={filters.areaRange[0]} maxVal={filters.areaRange[1]} onMin={v => updateF('areaRange', [v, filters.areaRange[1]])} onMax={v => updateF('areaRange', [filters.areaRange[0], v])} unit="평"/>
          </FilterBtn>
          <FilterBtn label="빌딩명" k="dl-bld" openF={openF} setOpenF={setOpenF} hasValue={hasV('building')}>
            <input type="text" value={filters.building} onChange={e => updateF('building', e.target.value)}
              placeholder="빌딩명 검색" className="w-full px-2 py-1 text-[12px] border border-slate-200 rounded outline-none focus:border-indigo-400"/>
          </FilterBtn>
          <FilterBtn label="📅 만기일" k="dl-exp" openF={openF} setOpenF={setOpenF} hasValue={hasV('expDate')}>
            <DateRange minVal={filters.expDate[0]} maxVal={filters.expDate[1]} onMin={v => updateF('expDate', [v, filters.expDate[1]])} onMax={v => updateF('expDate', [filters.expDate[0], v])}/>
          </FilterBtn>
          <FilterBtn label="📅 딜 생성일" k="dl-gd" openF={openF} setOpenF={setOpenF} hasValue={hasV('genDate')}>
            <DateRange minVal={filters.genDate[0]} maxVal={filters.genDate[1]} onMin={v => updateF('genDate', [v, filters.genDate[1]])} onMax={v => updateF('genDate', [filters.genDate[0], v])}/>
          </FilterBtn>
          <FilterBtn label="콜드콜 상태" k="dl-cc" openF={openF} setOpenF={setOpenF} hasValue={hasV('coldStatus')}>
            <MultiOpts opts={['신규','통화완료','부재','재콜예정','니즈확인','리드전환']} selected={filters.coldStatus} onToggle={v => toggleArr('coldStatus', v)}/>
          </FilterBtn>
          <select value={sort} onChange={e => setSort(e.target.value)}
            className="ml-auto px-2.5 py-1.5 text-[11px] border border-slate-200 rounded font-semibold text-slate-700 bg-white outline-none focus:border-indigo-400">
            <option value="contractDate">예상 계약일 임박순</option>
            <option value="expiry">만기일 임박순</option>
            <option value="area">면적 큰순</option>
            <option value="grade">등급 높은순</option>
            <option value="recent">최근 생성순</option>
          </select>
        </div>
      )}

      <div className="bg-white px-4 py-2 flex items-center justify-between flex-shrink-0 border-b border-slate-100 text-[12px]">
        <div className="font-semibold">총 <span className="text-rose-600 font-bold">{filtered.length}</span> 건 · {page}/{totalPages} 페이지</div>
        <select value={perPage} onChange={e => { setPerPage(+e.target.value); setPage(1); }}
          className="px-2 py-1 text-[11px] border border-slate-200 rounded font-semibold text-slate-700 bg-white outline-none focus:border-indigo-400">
          <option value={15}>15개씩</option>
          <option value={30}>30개씩</option>
          <option value={50}>50개씩</option>
        </select>
      </div>

      <div className="flex-1 overflow-auto">
        <table className="w-full text-[11px] bg-white">
          <thead className="bg-slate-50 sticky top-0 z-10">
            <tr className="text-slate-500 font-semibold border-b border-slate-200">
              <th className="px-3 py-2 text-left">거래처명</th>
              <th className="px-3 py-2 text-left">딜 상태</th>
              {!onlyMy && <th className="px-3 py-2 text-left">담당자</th>}
              <th className="px-3 py-2 text-left">권역</th>
              <th className="px-3 py-2 text-right">예상 면적</th>
              <th className="px-3 py-2 text-left">만기일</th>
              <th className="px-3 py-2 text-left">예상 계약일</th>
              {!onlyMy && <th className="px-3 py-2 text-left">생성일</th>}
              <th className="px-3 py-2 text-center w-24">상세</th>
            </tr>
          </thead>
          <tbody>
            {paged.map(d => (
              <tr key={d.id} onClick={() => onOpenDeal(d.id)} className="border-b border-slate-100 hover:bg-amber-50/40 cursor-pointer transition">
                <td className="px-3 py-2.5"><div className="flex items-center gap-1.5"><span className="font-semibold text-slate-800">{d.co}</span><span className={`px-1.5 py-0.5 text-[9px] font-bold rounded ${GRADE_STYLES[d.cg] || GRADE_STYLES.E}`}>{d.cg}</span></div></td>
                <td className="px-3 py-2.5"><DealStatusPill status={d.st}/></td>
                {!onlyMy && <td className="px-3 py-2.5 text-slate-600">{d.mgr}</td>}
                <td className="px-3 py-2.5"><DealRegionPill region={d.region}/></td>
                <td className="px-3 py-2.5 text-right tabular-nums font-semibold">{d.area} 평</td>
                <td className="px-3 py-2.5 tabular-nums"><ExpiryBadge value={d.expiry} type={d.expiryType}/></td>
                <td className="px-3 py-2.5 text-slate-500 tabular-nums">{d.ec}</td>
                {!onlyMy && <td className="px-3 py-2.5 text-slate-500 tabular-nums">{d.gen}</td>}
                <td className="px-3 py-2.5 text-center">
                  <button onClick={e => { e.stopPropagation(); onOpenDeal(d.id); }}
                    className="px-3 py-1 text-[10px] font-bold bg-indigo-600 text-white rounded hover:bg-indigo-700">상세 보기</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <div className="bg-white border-t border-slate-200 px-4 py-2 flex items-center justify-between text-[10px] flex-shrink-0">
        <div className="flex gap-1.5 flex-wrap">
          {Object.entries(DEAL_STATUS_STYLES).map(([k, [bg, c]]) => (
            <span key={k} style={{display:'inline-block',padding:'2px 8px',borderRadius:4,fontSize:10,fontWeight:500,background:bg,color:c}}>{k}</span>
          ))}
        </div>
        <div className="flex items-center gap-1 text-[11px]">
          <button onClick={() => setPage(p => Math.max(1, p-1))} disabled={page === 1} className="px-2 py-0.5 disabled:opacity-30">‹</button>
          {Array.from({length: totalPages}).map((_, i) => (
            <button key={i} onClick={() => setPage(i+1)} className={`px-2 py-0.5 rounded ${page === i+1 ? 'bg-indigo-600 text-white font-bold' : 'hover:bg-slate-100'}`}>{i+1}</button>
          ))}
          <button onClick={() => setPage(p => Math.min(totalPages, p+1))} disabled={page === totalPages} className="px-2 py-0.5 disabled:opacity-30">›</button>
        </div>
      </div>
    </div>
  );
}

function DealDetailPage({ dealId, onBack }) {
  const d = DEALS.find(x => x.id === dealId);
  if (!d) return <div className="flex-1 flex items-center justify-center text-slate-400">딜 정보를 찾을 수 없습니다</div>;
  const stepIdx = DEAL_STEPS.indexOf(d.st);
  return (
    <div className="flex-1 overflow-auto bg-slate-50">
      <div className="bg-white border-b border-slate-200 px-5 py-2.5 flex items-center justify-between flex-shrink-0 sticky top-0 z-10">
        <div className="flex items-center gap-3">
          <button onClick={onBack} className="flex items-center gap-1 px-2 py-1 rounded hover:bg-slate-100 text-slate-600 hover:text-indigo-600 text-[12px] font-semibold">
            <ChevronLeft size={14} /> 뒤로 가기
          </button>
          <div className="h-4 w-px bg-slate-200" />
          <span className="text-[10px] text-slate-500 font-mono">{d.did}</span>
          <span className={`px-2 py-0.5 text-[10px] font-bold rounded ${GRADE_STYLES[d.cg]}`}>{d.cg}</span>
          <h1 className="font-bold text-[16px] text-slate-900">{d.co}</h1>
          <DealStatusPill status={d.st}/>
        </div>
        <div className="flex items-center gap-2">
          <button className="px-3 py-1.5 text-[11px] font-semibold border border-slate-200 rounded text-slate-700 hover:bg-slate-50">수정</button>
          <button className="px-3 py-1.5 text-[11px] font-bold bg-emerald-600 text-white rounded hover:bg-emerald-700">계약 진행 ↗</button>
        </div>
      </div>

function DealDetailBody({ d, stepIdx, hideHeader }) {
  const [memoInput, setMemoInput] = useState('');

  const addMemo = () => {
    if (!memoInput.trim()) return;
    const now = new Date();
    const dt = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    setAddedMemos(prev => [{ d: dt, t: memoInput }, ...prev]);

    <React.Fragment>
      <div className="bg-slate-50 px-3 py-2 text-[11px] text-slate-500 border-r border-b border-slate-100">{k}</div>

      <div className="px-3 py-2 rounded-lg mt-4 mb-2 text-[12px] font-bold bg-slate-100 text-slate-700">📝 딜 활동 기록</div>
      <div className="border border-indigo-200 rounded-lg overflow-hidden mb-3">

        {addedMemos.map((m, i) => (
          <div key={i} className="px-3 py-2 text-[12px] border-b border-slate-100 last:border-0 bg-white">
            <span className="text-[10px] text-slate-400">{m.d}</span>
            <div className="mt-0.5">{m.t}</div>
          </div>
        ))}
        <textarea value={memoInput} onChange={e => setMemoInput(e.target.value)} rows={2}
          placeholder="딜 활동 메모를 입력하세요..."
          className="w-full px-3 py-2 text-[12px] outline-none resize-none"/>
        <div className="flex justify-end px-3 py-1.5 bg-slate-50 border-t border-slate-100">
          <button onClick={addMemo} className="px-3 py-1 text-[11px] font-bold bg-slate-800 text-white rounded hover:bg-slate-900">메모 추가</button>
        </div>
      </div>
      <div className="border border-slate-200 rounded-lg px-4">
        {d.log.map((x, i) => (
          <div key={i} className="flex gap-2 py-2.5 border-b border-slate-100 last:border-0">
            <span className="w-2 h-2 rounded-full mt-1.5 bg-amber-500"/>
            <div className="flex-1">
              <div className="text-[10px] text-slate-500 mb-0.5">{x.d}</div>
              <div className="text-[12px]">{x.m}</div>
            </div>
          </div>
        ))}
      </div>
    </>
  );
}

function ContractsPage({ onlyMy, onOpenContract }) {
  const [sort, setSort] = useState('endDate');
  const [perPage, setPerPage] = useState(15);
  const [page, setPage] = useState(1);
  const [openF, setOpenF] = useState(null);
  const [filters, setFilters] = useState({
    company:'', status:[], grade:[], manager:[], region:[], cType:[],
    startDate:['',''], endDate:['',''], areaRange:['',''], building:'', dealId:'', rentRange:['',''],
  });
  const updateF = (k, v) => setFilters(p => ({ ...p, [k]: v }));
  const toggleArr = (k, v) => setFilters(p => ({ ...p, [k]: p[k].includes(v) ? p[k].filter(x => x !== v) : [...p[k], v] }));
  const hasV = (k) => {
    const v = filters[k];
    if (Array.isArray(v)) {
      if (v.length === 2 && typeof v[0] === 'string' && (v[0] !== '' || v[1] !== '')) return true;
      return v.length > 0 && typeof v[0] !== 'string';
    }
    return v && v !== '';
  };
  const resetAll = () => setFilters({
    company:'', status:[], grade:[], manager:[], region:[], cType:[],
    startDate:['',''], endDate:['',''], areaRange:['',''], building:'', dealId:'', rentRange:['',''],
  });
  useEffect(() => {
    const h = (e) => { if (!e.target.closest('.f-btn-wrap')) setOpenF(null); };
    document.addEventListener('click', h);
    return () => document.removeEventListener('click', h);
  }, []);
  const parseNum = (s) => parseInt(String(s).replace(/[^0-9]/g,'')) || 0;

  const filtered = useMemo(() => {
    let arr = CONTRACTS.filter(c => {
      if (onlyMy && c.mgr !== '김민수' && c.mgr !== '이수진') return false;
      if (filters.company && !c.co.toLowerCase().includes(filters.company.toLowerCase())) return false;
      if (filters.status.length > 0 && !filters.status.includes(c.st)) return false;
      if (filters.grade.length > 0 && !filters.grade.includes(c.cg)) return false;
      if (filters.manager.length > 0 && !filters.manager.includes(c.mgr)) return false;
      if (filters.region.length > 0 && !filters.region.includes(c.region)) return false;
      if (filters.cType.length > 0 && !filters.cType.includes(c.type)) return false;
      if (filters.building && !c.bld.toLowerCase().includes(filters.building.toLowerCase())) return false;
      if (filters.dealId && !c.did.toLowerCase().includes(filters.dealId.toLowerCase())) return false;
      const a = parseNum(c.area);
      if (filters.areaRange[0] && a < +filters.areaRange[0]) return false;
      if (filters.areaRange[1] && a > +filters.areaRange[1]) return false;
      if (filters.rentRange[0] && c.rentNum < +filters.rentRange[0]) return false;
      if (filters.rentRange[1] && c.rentNum > +filters.rentRange[1]) return false;
      const s = c.start.replace(/\./g, '-'), e = c.end.replace(/\./g, '-');
      if (filters.startDate[0] && s < filters.startDate[0]) return false;
      if (filters.startDate[1] && s > filters.startDate[1]) return false;
      if (filters.endDate[0] && e < filters.endDate[0]) return false;
      if (filters.endDate[1] && e > filters.endDate[1]) return false;
      return true;
    });
    arr.sort((a, b) => {
      switch (sort) {
        case 'startDate': return b.start.localeCompare(a.start);
        case 'area': return parseNum(b.area) - parseNum(a.area);
        case 'grade': return a.cg.localeCompare(b.cg);
        case 'recent': return b.gen.localeCompare(a.gen);
        case 'endDate':
        default: return a.end.localeCompare(b.end);
      }
    });
    return arr;
  }, [onlyMy, sort, filters]);
  const totalPages = Math.max(1, Math.ceil(filtered.length / perPage));
  const paged = filtered.slice((page-1)*perPage, page*perPage);
  useEffect(() => { if (page > totalPages) setPage(1); }, [totalPages, page]);

  return (
    <div className="flex-1 flex flex-col overflow-hidden bg-slate-50">
      <div className="bg-white border-b border-slate-200 px-5 py-3 flex items-center justify-between flex-shrink-0">
        <div className="flex items-center gap-3">
          <div className="w-7 h-7 rounded-lg bg-emerald-100 flex items-center justify-center text-emerald-700">📄</div>
          <h1 className="font-bold text-[15px] text-slate-900">{onlyMy ? 'My 계약' : '전체 계약'}</h1>
          <span className="text-[11px] text-slate-400">{onlyMy ? '담당 계약 목록' : '계약 관리 현황'}</span>
        </div>
        <div className="flex items-center gap-2">
          <button onClick={resetAll} className="px-2.5 py-1.5 text-[11px] text-slate-600 hover:text-indigo-600">↺ 초기화</button>
          <button className="px-3 py-1.5 text-[11px] font-bold bg-indigo-600 text-white rounded hover:bg-indigo-700">+ 계약 등록</button>
        </div>
      </div>

      <div className="bg-white px-4 py-2 flex items-center gap-1.5 flex-wrap flex-shrink-0 border-b border-slate-100">
        <span className="text-[11px] text-slate-500 font-semibold mr-1">필터</span>
        <FilterBtn label="🔍 거래처명" k="ct-co" openF={openF} setOpenF={setOpenF} hasValue={hasV('company')}>
          <input type="text" value={filters.company} onChange={e => updateF('company', e.target.value)}
            placeholder="검색어 입력" className="w-full px-2 py-1 text-[12px] border border-slate-200 rounded outline-none focus:border-indigo-400"/>
        </FilterBtn>
        <FilterBtn label="계약 상태" k="ct-st" openF={openF} setOpenF={setOpenF} hasValue={hasV('status')}>
          <MultiOpts opts={['계약 완료','입주 예정','입주 완료','계약 해지','갱신 협의']} selected={filters.status} onToggle={v => toggleArr('status', v)}/>
        </FilterBtn>
        {!onlyMy && <FilterBtn label="☆ 거래처 등급" k="ct-gr" openF={openF} setOpenF={setOpenF} hasValue={hasV('grade')}>
          <MultiOpts opts={['A','B','C','D','E','F']} selected={filters.grade} onToggle={v => toggleArr('grade', v)}/>
        </FilterBtn>}
        {!onlyMy && <FilterBtn label="담당 세일즈" k="ct-mg" openF={openF} setOpenF={setOpenF} hasValue={hasV('manager')}>
          <MultiOpts opts={['김민수','이수진','박준호','한소연','정대한']} selected={filters.manager} onToggle={v => toggleArr('manager', v)}/>
        </FilterBtn>}
        <FilterBtn label="권역" k="ct-rg" openF={openF} setOpenF={setOpenF} hasValue={hasV('region')}>
          <MultiOpts opts={['CBD','GBD','YBD','기타']} selected={filters.region} onToggle={v => toggleArr('region', v)}/>
        </FilterBtn>
        <FilterBtn label="계약 유형" k="ct-tp" openF={openF} setOpenF={setOpenF} hasValue={hasV('cType')}>
          <MultiOpts opts={['신규','갱신','확장 이전']} selected={filters.cType} onToggle={v => toggleArr('cType', v)}/>
        </FilterBtn>
        {onlyMy && (
          <select value={sort} onChange={e => setSort(e.target.value)}
            className="ml-auto px-2.5 py-1.5 text-[11px] border border-slate-200 rounded font-semibold text-slate-700 bg-white outline-none focus:border-indigo-400">
            <option value="endDate">계약 종료일 임박순</option>
            <option value="startDate">계약 시작일순</option>
            <option value="area">면적 큰순</option>
            <option value="recent">최근 생성순</option>
          </select>
        )}
      </div>

      {!onlyMy && (
        <div className="bg-white px-4 py-2 flex items-center gap-1.5 flex-wrap flex-shrink-0 border-b border-slate-200">
          <span className="text-[11px] text-slate-300 mr-1">　</span>
          <FilterBtn label="📅 계약 시작일" k="ct-ss" openF={openF} setOpenF={setOpenF} hasValue={hasV('startDate')}>
            <DateRange minVal={filters.startDate[0]} maxVal={filters.startDate[1]} onMin={v => updateF('startDate', [v, filters.startDate[1]])} onMax={v => updateF('startDate', [filters.startDate[0], v])}/>
          </FilterBtn>
          <FilterBtn label="📅 계약 종료일" k="ct-se" openF={openF} setOpenF={setOpenF} hasValue={hasV('endDate')}>
            <DateRange minVal={filters.endDate[0]} maxVal={filters.endDate[1]} onMin={v => updateF('endDate', [v, filters.endDate[1]])} onMax={v => updateF('endDate', [filters.endDate[0], v])}/>
          </FilterBtn>
          <FilterBtn label="계약 면적(평)" k="ct-ar" openF={openF} setOpenF={setOpenF} hasValue={hasV('areaRange')}>

function ContractDetailPage({ contractId, onBack }) {
  const c = CONTRACTS.find(x => x.id === contractId);
  if (!c) return <div className="flex-1 flex items-center justify-center text-slate-400">계약 정보를 찾을 수 없습니다</div>;
  const [memoInput, setMemoInput] = useState('');
  const [addedMemos, setAddedMemos] = useState([]);
  const addMemo = () => {
    if (!memoInput.trim()) return;
    const now = new Date();
    const dt = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    setAddedMemos(prev => [{ d: dt, t: memoInput }, ...prev]);
    setMemoInput('');
  };
  const KV = ({ k, v, tone }) => (
    <React.Fragment>
      <div className="bg-slate-50 px-3 py-2 text-[11px] text-slate-500 border-r border-b border-slate-100">{k}</div>
      <div className={`px-3 py-2 text-[12px] font-semibold border-r border-b border-slate-100 ${tone === 'g' ? 'text-emerald-600' : tone === 'w' ? 'text-amber-600' : 'text-slate-800'}`}>{v}</div>
    </React.Fragment>
  );

  return (
    <div className="flex-1 overflow-auto bg-slate-50">
      <div className="bg-white border-b border-slate-200 px-5 py-2.5 flex items-center justify-between flex-shrink-0 sticky top-0 z-10">
        <div className="flex items-center gap-3">
          <button onClick={onBack} className="flex items-center gap-1 px-2 py-1 rounded hover:bg-slate-100 text-slate-600 hover:text-indigo-600 text-[12px] font-semibold">
            <ChevronLeft size={14} /> 뒤로 가기
          </button>
          <div className="h-4 w-px bg-slate-200" />
          <span className="text-[10px] text-slate-500 font-mono">{c.cid}</span>
          <span className={`px-2 py-0.5 text-[10px] font-bold rounded ${GRADE_STYLES[c.cg]}`}>{c.cg}</span>
          <h1 className="font-bold text-[16px] text-slate-900">{c.co}</h1>
          <ContractStatusPill status={c.st}/>
          <ContractTypePill type={c.type}/>
        </div>
        <div className="flex items-center gap-2">
          <button className="px-3 py-1.5 text-[11px] font-semibold border border-slate-200 rounded text-slate-700 hover:bg-slate-50">수정</button>
          <button className="px-3 py-1.5 text-[11px] font-bold bg-emerald-600 text-white rounded hover:bg-emerald-700">✓ 계약 관리</button>
        </div>
      </div>

      <div className="p-5">
        <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-4 mb-4">
          <div className="grid grid-cols-4 gap-2">
            <div className="bg-white border border-emerald-200 rounded-lg px-3 py-2"><div className="text-[10px] text-emerald-700 font-semibold">계약 면적</div><div className="text-[14px] font-bold mt-0.5 text-emerald-600">{c.area} 평</div></div>
            <div className="bg-white border border-emerald-200 rounded-lg px-3 py-2"><div className="text-[10px] text-emerald-700 font-semibold">계약 기간</div><div className="text-[11px] font-bold mt-0.5 text-emerald-900">{c.start} ~ {c.end}</div></div>
            <div className="bg-white border border-emerald-200 rounded-lg px-3 py-2"><div className="text-[10px] text-emerald-700 font-semibold">월 임대료</div><div className="text-[14px] font-bold mt-0.5 text-emerald-900">{c.rent}</div></div>

          </div>
        </div>

        <div className="px-3 py-2 rounded-lg mt-4 mb-2 text-[12px] font-bold bg-emerald-50 text-emerald-900">📄 계약 기본 정보</div>
        <div className="grid grid-cols-4 border border-slate-200 rounded-lg overflow-hidden text-[11px]">
          <KV k="계약 ID" v={c.cid}/>

        <div className="px-3 py-2 rounded-lg mt-4 mb-2 text-[12px] font-bold bg-amber-50 text-amber-900">🏢 임대 상세 정보</div>
        <div className="grid grid-cols-4 border border-slate-200 rounded-lg overflow-hidden text-[11px]">
          <KV k="빌딩명" v={c.bld}/>
          <KV k="층/호수" v={c.floor}/>

          <KV k="월 임대료" v={c.rent}/>

        <div className="grid grid-cols-4 border border-slate-200 rounded-lg overflow-hidden text-[11px]">
          <KV k="거래처명" v={c.co}/>
          <KV k="거래처 등급" v={<span className={`px-1.5 py-0.5 text-[9px] font-bold rounded ${GRADE_STYLES[c.cg]}`}>{c.cg}</span>}/>
          <KV k="딜 ID" v={c.did !== '-' ? c.did : '직접 갱신'}/>
          <KV k="생성일" v={c.gen}/>
        </div>

        <div className="px-3 py-2 rounded-lg mt-4 mb-2 text-[12px] font-bold bg-slate-100 text-slate-700">📝 계약 활동 기록</div>
        <div className="border border-indigo-200 rounded-lg overflow-hidden mb-3">
          <div className="bg-indigo-50 px-3 py-2 text-[11px] font-semibold text-indigo-900 border-b border-indigo-200">✏️ 메모 직접 입력</div>
          {addedMemos.map((m, i) => (
            <div key={i} className="px-3 py-2 text-[12px] border-b border-slate-100 last:border-0 bg-white">
              <span className="text-[10px] text-slate-400">{m.d}</span>
              <div className="mt-0.5">{m.t}</div>
            </div>
          ))}
          <textarea value={memoInput} onChange={e => setMemoInput(e.target.value)} rows={2}
            placeholder="계약 활동 메모를 입력하세요..."
            className="w-full px-3 py-2 text-[12px] outline-none resize-none"/>
          <div className="flex justify-end px-3 py-1.5 bg-slate-50 border-t border-slate-100">
            <button onClick={addMemo} className="px-3 py-1 text-[11px] font-bold bg-slate-800 text-white rounded hover:bg-slate-900">메모 추가</button>
          </div>
        </div>
        <div className="border border-slate-200 rounded-lg px-4">
          {c.log.map((x, i) => (
            <div key={i} className="flex gap-2 py-2.5 border-b border-slate-100 last:border-0">
              <span className="w-2 h-2 rounded-full mt-1.5 bg-emerald-500"/>
              <div className="flex-1">
                <div className="text-[10px] text-slate-500 mb-0.5">{x.d}</div>
                <div className="text-[12px]">{x.m}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

  const [sort, setSort] = useState('recent');
  const [perPage, setPerPage] = useState(15);
  const [page, setPage] = useState(1);
  const [openF, setOpenF] = useState(null);
  const [filters, setFilters] = useState({
    name:'', company:'', grade:[], role:'all', ourMgr:[], title:'',
    lastContact:['',''], phone:'all', email:'all',
  });
  const updateF = (k, v) => setFilters(p => ({ ...p, [k]: v }));
  const toggleArr = (k, v) => setFilters(p => ({ ...p, [k]: p[k].includes(v) ? p[k].filter(x => x !== v) : [...p[k], v] }));
  const hasV = (k) => {
    const v = filters[k];
    if (Array.isArray(v)) {
      if (v.length === 2 && typeof v[0] === 'string' && (v[0] !== '' || v[1] !== '')) return true;
      return v.length > 0 && typeof v[0] !== 'string';
    }
    return v && v !== 'all' && v !== '';
  };
  const resetAll = () => setFilters({
    name:'', company:'', grade:[], role:'all', ourMgr:[], title:'',
    lastContact:['',''], phone:'all', email:'all',
  });
  useEffect(() => {
    const h = (e) => { if (!e.target.closest('.f-btn-wrap')) setOpenF(null); };
    document.addEventListener('click', h);
    return () => document.removeEventListener('click', h);
  }, []);

  const filtered = useMemo(() => {
    let arr = CONTACTS.filter(c => {
      if (filters.name && !c.name.toLowerCase().includes(filters.name.toLowerCase())) return false;
      if (filters.company && !c.co.toLowerCase().includes(filters.company.toLowerCase())) return false;
      if (filters.grade.length > 0 && !filters.grade.includes(c.coGrade)) return false;
      if (filters.role !== 'all' && c.role !== filters.role) return false;
      if (filters.ourMgr.length > 0 && !filters.ourMgr.includes(c.ourMgr)) return false;
      if (filters.title && !c.title.toLowerCase().includes(filters.title.toLowerCase())) return false;
      if (filters.phone === 'Y' && !c.hasPhone) return false;
      if (filters.phone === 'N' && c.hasPhone) return false;
      if (filters.email === 'Y' && !c.hasEmail) return false;
      if (filters.email === 'N' && c.hasEmail) return false;
      const lc = c.lastContact.replace(/\./g, '-');
      if (filters.lastContact[0] && lc < filters.lastContact[0]) return false;
      if (filters.lastContact[1] && lc > filters.lastContact[1]) return false;
      return true;
    });
    arr.sort((a, b) => {
      switch (sort) {
        case 'name': return a.name.localeCompare(b.name, 'ko');
        case 'grade': return a.coGrade.localeCompare(b.coGrade);
        case 'company': return a.co.localeCompare(b.co, 'ko');
        case 'recent':
        default: return b.lastContact.localeCompare(a.lastContact);
      }
    });
    return arr;
  }, [sort, filters]);
  const totalPages = Math.max(1, Math.ceil(filtered.length / perPage));
  const paged = filtered.slice((page-1)*perPage, page*perPage);
  useEffect(() => { if (page > totalPages) setPage(1); }, [totalPages, page]);

  return (
    <div className="flex-1 flex flex-col overflow-hidden bg-slate-50">
      <div className="bg-white border-b border-slate-200 px-5 py-3 flex items-center justify-between flex-shrink-0">
        <div className="flex items-center gap-3">
          <div className="w-7 h-7 rounded-lg bg-sky-100 flex items-center justify-center text-sky-700">👤</div>
          <h1 className="font-bold text-[15px] text-slate-900">전체 임차 담당자</h1>
          <span className="text-[11px] text-slate-400">거래처 컨택 담당자 관리</span>
        </div>
        <div className="flex items-center gap-2">
          <button onClick={resetAll} className="px-2.5 py-1.5 text-[11px] text-slate-600 hover:text-indigo-600">↺ 초기화</button>
          <button className="px-3 py-1.5 text-[11px] font-bold bg-indigo-600 text-white rounded hover:bg-indigo-700">+ 임차 담당자 등록</button>
        </div>
      </div>

      <div className="bg-white px-4 py-2 flex items-center gap-1.5 flex-wrap flex-shrink-0 border-b border-slate-100">
        <span className="text-[11px] text-slate-500 font-semibold mr-1">필터</span>
        <FilterBtn label="🔍 이름" k="ct2-nm" openF={openF} setOpenF={setOpenF} hasValue={hasV('name')}>
          <input type="text" value={filters.name} onChange={e => updateF('name', e.target.value)}
            placeholder="담당자 이름 검색" className="w-full px-2 py-1 text-[12px] border border-slate-200 rounded outline-none focus:border-indigo-400"/>
        </FilterBtn>
        <FilterBtn label="소속 거래처" k="ct2-co" openF={openF} setOpenF={setOpenF} hasValue={hasV('company')}>
          <input type="text" value={filters.company} onChange={e => updateF('company', e.target.value)}
            placeholder="거래처명 검색" className="w-full px-2 py-1 text-[12px] border border-slate-200 rounded outline-none focus:border-indigo-400"/>
        </FilterBtn>
        <FilterBtn label="☆ 거래처 등급" k="ct2-gr" openF={openF} setOpenF={setOpenF} hasValue={hasV('grade')}>
          <MultiOpts opts={['A','B','C','D','E','F']} selected={filters.grade} onToggle={v => toggleArr('grade', v)}/>
        </FilterBtn>
        <FilterBtn label="담당 구분" k="ct2-rl" openF={openF} setOpenF={setOpenF} hasValue={hasV('role')}>
          <RadioOpts name="ct2-rl" opts={[['all','전체'],['주담당','주담당'],['실무','실무'],['보조','보조']]} value={filters.role} onChange={v => updateF('role', v)}/>
        </FilterBtn>
        <FilterBtn label="담당 세일즈" k="ct2-mg" openF={openF} setOpenF={setOpenF} hasValue={hasV('ourMgr')}>
          <MultiOpts opts={['김민수','이수진','박준호','한소연','정대한','최지원']} selected={filters.ourMgr} onToggle={v => toggleArr('ourMgr', v)}/>
        </FilterBtn>
        <FilterBtn label="직책 키워드" k="ct2-tt" openF={openF} setOpenF={setOpenF} hasValue={hasV('title')}>
          <input type="text" value={filters.title} onChange={e => updateF('title', e.target.value)}
            placeholder="직책 검색 (예: 팀장)" className="w-full px-2 py-1 text-[12px] border border-slate-200 rounded outline-none focus:border-indigo-400"/>
        </FilterBtn>
        <FilterBtn label="📅 최근 연락일" k="ct2-lc" openF={openF} setOpenF={setOpenF} hasValue={hasV('lastContact')}>
          <DateRange minVal={filters.lastContact[0]} maxVal={filters.lastContact[1]} onMin={v => updateF('lastContact', [v, filters.lastContact[1]])} onMax={v => updateF('lastContact', [filters.lastContact[0], v])}/>
        </FilterBtn>
        <FilterBtn label="핸드폰 유무" k="ct2-ph" openF={openF} setOpenF={setOpenF} hasValue={hasV('phone')}>
          <RadioOpts name="ct2-ph" opts={[['all','전체'],['Y','Y'],['N','N']]} value={filters.phone} onChange={v => updateF('phone', v)}/>
        </FilterBtn>
        <FilterBtn label="이메일 유무" k="ct2-em" openF={openF} setOpenF={setOpenF} hasValue={hasV('email')}>
          <RadioOpts name="ct2-em" opts={[['all','전체'],['Y','Y'],['N','N']]} value={filters.email} onChange={v => updateF('email', v)}/>
        </FilterBtn>
        <select value={sort} onChange={e => setSort(e.target.value)}
          className="ml-auto px-2.5 py-1.5 text-[11px] border border-slate-200 rounded font-semibold text-slate-700 bg-white outline-none focus:border-indigo-400">
          <option value="recent">최근 연락순</option>
          <option value="name">이름순</option>
          <option value="grade">거래처 등급순</option>
          <option value="company">소속 거래처순</option>
        </select>
      </div>

      <div className="bg-white px-4 py-2 flex items-center justify-between flex-shrink-0 border-b border-slate-100 text-[12px]">
        <div className="font-semibold">총 <span className="text-rose-600 font-bold">{filtered.length}</span> 명 · {page}/{totalPages} 페이지</div>
        <select value={perPage} onChange={e => { setPerPage(+e.target.value); setPage(1); }}
          className="px-2 py-1 text-[11px] border border-slate-200 rounded font-semibold text-slate-700 bg-white outline-none focus:border-indigo-400">
          <option value={15}>15개씩</option>
          <option value={30}>30개씩</option>
          <option value={50}>50개씩</option>
        </select>
      </div>

      <div className="flex-1 overflow-auto">
        <table className="w-full text-[11px] bg-white">
          <thead className="bg-slate-50 sticky top-0 z-10">
            <tr className="text-slate-500 font-semibold border-b border-slate-200">
              <th className="px-3 py-2 text-left">담당자</th>
              <th className="px-3 py-2 text-left">소속 거래처</th>
              <th className="px-3 py-2 text-left">담당 구분</th>
              <th className="px-3 py-2 text-left">핸드폰</th>
              <th className="px-3 py-2 text-left">이메일</th>
              <th className="px-3 py-2 text-center w-12">폰</th>
              <th className="px-3 py-2 text-center w-12">메일</th>
              <th className="px-3 py-2 text-left">최근 연락일</th>
              <th className="px-3 py-2 text-left">담당 세일즈</th>
              <th className="px-3 py-2 text-center w-24">상세</th>
            </tr>
          </thead>
          <tbody>
            {paged.map(c => (
              <tr key={c.id} onClick={() => onOpenContact(c.id)} className="border-b border-slate-100 hover:bg-sky-50/40 cursor-pointer transition">
                <td className="px-3 py-2.5">
                  <div className="flex items-center gap-2">
                    <div className="w-8 h-8 rounded-full bg-sky-100 text-sky-900 flex items-center justify-center text-[10px] font-bold flex-shrink-0">{contactInitials(c.name)}</div>
                    <div>
                      <div className="font-semibold text-slate-800">{c.name}</div>
                      <div className="text-[10px] text-slate-500">{c.title}</div>
                    </div>
                  </div>
                </td>
                <td className="px-3 py-2.5">
                  <span className="font-semibold text-slate-700">{c.co}</span>
                  <span className={`ml-1 px-1.5 py-0.5 text-[9px] font-bold rounded ${GRADE_STYLES[c.coGrade] || GRADE_STYLES.E}`}>{c.coGrade}</span>
                </td>
                <td className="px-3 py-2.5"><ContactRolePill role={c.role}/></td>
                <td className="px-3 py-2.5 text-slate-600">{c.hasPhone ? c.phone : <span className="text-slate-400">미확보</span>}</td>
                <td className="px-3 py-2.5 text-slate-600 truncate" title={c.email}>{c.hasEmail ? c.email : <span className="text-slate-400">미확보</span>}</td>
                <td className="px-3 py-2.5 text-center font-bold" style={{color: c.hasPhone ? '#1D9E75' : '#aaa'}}>{c.hasPhone ? 'Y' : 'N'}</td>
                <td className="px-3 py-2.5 text-center font-bold" style={{color: c.hasEmail ? '#1D9E75' : '#aaa'}}>{c.hasEmail ? 'Y' : 'N'}</td>
                <td className="px-3 py-2.5 text-slate-500 tabular-nums">{c.lastContact}</td>
                <td className="px-3 py-2.5 text-slate-600">{c.ourMgr}</td>
                <td className="px-3 py-2.5 text-center">
                  <button onClick={e => { e.stopPropagation(); onOpenContact(c.id); }}
                    className="px-3 py-1 text-[10px] font-bold bg-indigo-600 text-white rounded hover:bg-indigo-700">상세 보기</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <div className="bg-white border-t border-slate-200 px-4 py-2 flex items-center justify-between text-[10px] flex-shrink-0">
        <div className="flex gap-1.5 flex-wrap items-center">
          <span className="text-slate-500">담당 구분:</span>
          {['주담당','실무','보조'].map(r => <ContactRolePill key={r} role={r}/>)}
          <span className="text-slate-400 ml-2">폰/메일 Y = 연락처 확보</span>
        </div>
        <div className="flex items-center gap-1 text-[11px]">
          <button onClick={() => setPage(p => Math.max(1, p-1))} disabled={page === 1} className="px-2 py-0.5 disabled:opacity-30">‹</button>
          {Array.from({length: totalPages}).map((_, i) => (
            <button key={i} onClick={() => setPage(i+1)} className={`px-2 py-0.5 rounded ${page === i+1 ? 'bg-indigo-600 text-white font-bold' : 'hover:bg-slate-100'}`}>{i+1}</button>
          ))}
          <button onClick={() => setPage(p => Math.min(totalPages, p+1))} disabled={page === totalPages} className="px-2 py-0.5 disabled:opacity-30">›</button>
        </div>
      </div>
    </div>
  );
}

function ContactDetailPage({ contactId, onBack, onOpenCompany }) {
  const c = CONTACTS.find(x => x.id === contactId);

  const [memoInput, setMemoInput] = useState('');
  const [addedMemos, setAddedMemos] = useState([]);
  const addMemo = () => {
    if (!memoInput.trim()) return;
    const now = new Date();
    const dt = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    setAddedMemos(prev => [{ d: dt, t: memoInput }, ...prev]);
    setMemoInput('');

  const KV = ({ k, v, tone }) => (
    <React.Fragment>
      <div className="bg-slate-50 px-3 py-2 text-[11px] text-slate-500 border-r border-b border-slate-100">{k}</div>
